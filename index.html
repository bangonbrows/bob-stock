  _setCompPeriods(preset){
    const now=new Date();
    let aFrom,aTo,bFrom,bTo;
    if(preset==='3m'){
      aTo=new Date(); aFrom=new Date(now.getFullYear(),now.getMonth()-3,now.getDate());
      bTo=new Date(aFrom.getTime()-86400000); bFrom=new Date(bTo.getFullYear(),bTo.getMonth()-3,bTo.getDate());
    } else if(preset==='6m'){
      aTo=new Date(); aFrom=new Date(now.getFullYear(),now.getMonth()-6,now.getDate());
      bTo=new Date(aFrom.getTime()-86400000); bFrom=new Date(bTo.getFullYear(),bTo.getMonth()-6,bTo.getDate());
    } else if(preset==='1y'){
      aTo=new Date(); aFrom=new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
      bTo=new Date(aFrom.getTime()-86400000); bFrom=new Date(bTo.getFullYear()-1,bTo.getMonth(),bTo.getDate());
    } else if(preset==='yoy'){
      aTo=new Date(); aFrom=new Date(now.getFullYear(),now.getMonth()-6,now.getDate());
      bTo=new Date(aTo.getFullYear()-1,aTo.getMonth(),aTo.getDate()); bFrom=new Date(aFrom.getFullYear()-1,aFrom.getMonth(),aFrom.getDate());
    }
    const fmt=d2=>d2.toISOString().slice(0,10);
    document.getElementById('comp-a-from').value=fmt(aFrom);
    document.getElementById('comp-a-to').value=fmt(aTo);
    document.getElementById('comp-b-from').value=fmt(bFrom);
    document.getElementById('comp-b-to').value=fmt(bTo);
    this._renderComparisonData();
  },
  _setCompToggle(type){
    this._compToggle=type;
    ['in','out','both'].forEach(t=>{
      const btn=document.getElementById('comp-toggle-'+t);
      if(btn){btn.style.background=t===type?'var(--rose)':'#fff';btn.style.color=t===type?'white':'inherit';}
    });
    this._renderComparisonData();
  },
  _selectAllCompStores(select){
    document.querySelectorAll('.comp-store-cb').forEach(cb=>cb.checked=select);
    this._applyComparison();
  },
  _setTrendMetric(metric) {
    this._comp24Metric=metric;
    ['qty','val'].forEach(m=>{
      const btn=document.getElementById('trend-metric-'+m);
      if(btn){btn.style.background=m===metric?'var(--rose)':'#fff';btn.style.color=m===metric?'white':'inherit';}
    });
    this._renderComparisonData();
  },
  _applyComparison(){
    const selected=[...document.querySelectorAll('.comp-store-cb:checked')].map(cb=>cb.value);
    this._compStores=(this._compAllStores||[]).filter(s=>selected.includes(s.id));
    this._renderComparisonData();
  },
  _renderComparisonData(){
    const aFrom=document.getElementById('comp-a-from')?.value;
    const aTo=document.getElementById('comp-a-to')?.value;
    const bFrom=document.getElementById('comp-b-from')?.value;
    const bTo=document.getElementById('comp-b-to')?.value;
    const stores=this._compStores||[]; const isDir=this._compIsDir; const d=DB.get();
    const toggle=this._compToggle||'out';
    const getPD=(storeId,from,to)=>{
      const txns=d.transactions.filter(t=>t.storeId===storeId&&(!from||t.date>=from)&&(!to||t.date<=to));
      const ins=txns.filter(t=>t.type==='in'); const outs=txns.filter(t=>t.type==='out');
      const inU=ins.reduce((a,t)=>a+t.qty,0); const outU=outs.reduce((a,t)=>a+t.qty,0);
      const inV=ins.reduce((a,t)=>{const p=d.products.find(pr=>pr.id===t.productId);return a+(p?.price||0)*t.qty;},0);
      const outV=outs.reduce((a,t)=>{const p=d.products.find(pr=>pr.id===t.productId);return a+(p?.price||0)*t.qty;},0);
      const units=toggle==='in'?inU:toggle==='out'?outU:inU+outU;
      const val=toggle==='in'?inV:toggle==='out'?outV:inV+outV;
      return {inU,outU,units,inV,outV,val,txCount:txns.length};
    };
    const tLabel=toggle==='in'?'Stock IN':toggle==='out'?'Stock OUT':'Stock IN+OUT';
    const el1=document.getElementById('comp-chart-unit-label');
    const el2=document.getElementById('comp-chart-val-label');
    if(el1)el1.textContent=`Showing: ${tLabel} | Period A (green) vs Period B (teal)`;
    if(el2)el2.textContent=`Retail value (sell price × units) | Period A (pink) vs Period B (rose)`;
    const storeNames=stores.map(s=>s.name.replace(' Store',''));
    const aUnits=stores.map(s=>getPD(s.id,aFrom,aTo).units);
    const bUnits=stores.map(s=>getPD(s.id,bFrom,bTo).units);
    const aVals=stores.map(s=>getPD(s.id,aFrom,aTo).val);
    const bVals=stores.map(s=>getPD(s.id,bFrom,bTo).val);
    const chgColor=v=>v===null?'#9ca3af':parseFloat(v)>=0?'#16a34a':'#dc2626';
    const chgTxt=v=>v===null?'—':`${parseFloat(v)>=0?'+':''}${v}%`;
    const pctChg=(a,b)=>b>0?((a-b)/b*100).toFixed(1):null;
    const rows=stores.map(s=>{
      const aD=getPD(s.id,aFrom,aTo); const bD=getPD(s.id,bFrom,bTo);
      const uChg=pctChg(aD.units,bD.units); const vChg=pctChg(aD.val,bD.val);
      let dirCols='';
      if(isDir){
        const calcProfit=(from,to)=>d.transactions.filter(t=>t.storeId===s.id&&t.type==='out'&&(!from||t.date>=from)&&(!to||t.date<=to)).reduce((a,t)=>{const p=d.products.find(pr=>pr.id===t.productId);const c=Stock.costAtDate(t.productId,t.date);return p&&c!=null&&p.price!=null?a+(p.price-c)*t.qty:a;},0);
        const aP=calcProfit(aFrom,aTo); const bP=calcProfit(bFrom,bTo); const pChg=pctChg(aP,bP);
        dirCols=`<td>${UI.fmt(aP)}</td><td>${UI.fmt(bP)}</td><td style="color:${chgColor(pChg)};font-weight:700">${chgTxt(pChg)}</td>`;
      }
      return `<tr><td><strong>${s.name}</strong>${s.isFranchise?' <span class="franchise-badge">Franchise</span>':''}</td>
        <td style="text-align:center">${aD.units}</td><td style="text-align:center">${bD.units}</td>
        <td style="color:${chgColor(uChg)};font-weight:700;text-align:center">${chgTxt(uChg)}</td>
        <td>${UI.fmt(aD.val)}</td><td>${UI.fmt(bD.val)}</td>
        <td style="color:${chgColor(vChg)};font-weight:700;text-align:center">${chgTxt(vChg)}</td>
        ${dirCols}</tr>`;
    });
    const dirTH=isDir?'<th>A Profit</th><th>B Profit</th><th>Profit Δ</th>':'';
    document.getElementById('comp-table').innerHTML=`<table><thead><tr>
      <th>Store</th><th>A Units</th><th>B Units</th><th>Unit Δ</th>
      <th>A Value</th><th>B Value</th><th>Value Δ</th>${dirTH}
    </tr><tr style="font-size:.7rem;color:#9ca3af"><td></td><td colspan="3" style="padding:2px 8px">${tLabel}</td><td colspan="3" style="padding:2px 8px">Retail Value</td>${isDir?'<td colspan="3" style="padding:2px 8px">Est. Profit</td>':''}</tr></thead><tbody>${rows.join('')}</tbody></table>`;
    setTimeout(()=>{
      UI.makeChart('chart-comp-units',{type:'bar',data:{labels:storeNames,datasets:[
        {label:`Period A`,data:aUnits,backgroundColor:'#86efac',borderRadius:4},
        {label:`Period B`,data:bUnits,backgroundColor:'#6ee7b7',borderRadius:4}
      ]},options:{plugins:{legend:{position:'bottom'}},responsive:true,scales:{y:{beginAtZero:true}}}});
      UI.makeChart('chart-comp-value',{type:'bar',data:{labels:storeNames,datasets:[
        {label:`Period A`,data:aVals,backgroundColor:'#d8838b',borderRadius:4},
        {label:`Period B`,data:bVals,backgroundColor:'#fca5a5',borderRadius:4}
      ]},options:{plugins:{legend:{position:'bottom'}},responsive:true,scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString()}}}}});
      const months=[];const nowD=new Date();
      for(let i=23;i>=0;i--){const md=new Date(nowD.getFullYear(),nowD.getMonth()-i,1);months.push({label:md.toLocaleDateString('en-AU',{month:'short',year:'2-digit'}),from:md.toISOString().slice(0,7)+'-01',to:new Date(md.getFullYear(),md.getMonth()+1,0).toISOString().slice(0,10)});}
      const dI=DB.get();
      const trendMetric=this._comp24Metric||'qty';
      const getVal=(txns)=>trendMetric==='val'?txns.reduce((b,t)=>{const p=dI.products.find(pr=>pr.id===t.productId);return p?.price?b+t.qty*p.price:b;},0):txns.reduce((b,t)=>b+t.qty,0);
      const mIns=months.map(m=>stores.reduce((a,s)=>a+getVal(dI.transactions.filter(t=>t.storeId===s.id&&t.type==='in'&&t.date>=m.from&&t.date<=m.to)),0));
      const mOuts=months.map(m=>stores.reduce((a,s)=>a+getVal(dI.transactions.filter(t=>t.storeId===s.id&&(t.type==='out'||t.type==='return_in')&&t.date>=m.from&&t.date<=m.to)),0));
      const yFmt=trendMetric==='val'?{ticks:{callback:v=>'$'+v.toLocaleString()}}:{beginAtZero:true};
      const ds=[];
      if(toggle==='in'||toggle==='both') ds.push({label:'Stock IN',data:mIns,backgroundColor:'#86efac',borderRadius:3});
      if(toggle==='out'||toggle==='both') ds.push({label:'Stock OUT',data:mOuts,backgroundColor:'#fca5a5',borderRadius:3});
      UI.makeChart('chart-monthly',{type:'bar',data:{labels:months.map(m=>m.label),datasets:ds},options:{plugins:{legend:{position:'bottom'}},responsive:true,scales:{y:{beginAtZero:true,...yFmt}}}});
    },100);
  },

      if(f.cat) valProds=valProds.filter(p=>p.catId===f.cat);
      const totalVal=valProds.reduce((sum,p)=>sum+valStores.reduce((s2,sId)=>s2+(Stock.qty(p.id,sId)*(Stock.currentCost(p.id)||0)),0),0);
      const valLabel=(f.cat||f.pt||f.store)?'Filtered Stock Value':'Total Stock Value';
      const alerts=Stock.alerts(f.store?[f.store]:storeIds).length;
      const ins=txns.filter(t=>t.type==='in').reduce((a,t)=>a+t.qty,0);
      const outs=txns.filter(t=>t.type==='out').reduce((a,t)=>a+t.qty,0);
      const catBreakdown=d.categories.map(cat=>{
        const catProds=d.products.filter(p=>p.catId===cat.id&&(!f.cat||p.catId===f.cat));
        const stores=f.store?[f.store]:(storeIds||d.stores.filter(s=>s.active).map(s=>s.id));
        const total=catProds.reduce((sum,p)=>sum+stores.reduce((s2,sId)=>s2+Stock.qty(p.id,sId),0),0);

      el.innerHTML=`

        <div class="card card-body">
          <div style="font-weight:600;margin-bottom:12px">Export</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-secondary" onclick="Pages._exportCSV()">⬇ All Transactions CSV</button>
            <button class="btn btn-secondary" onclick="Pages._exportStockCSV()">⬇ Current Stock CSV</button>
            <button class="btn btn-secondary" onclick="window.print()">🖨 Print</button>
          </div>
        </div>`;
      setTimeout(()=>{
        const clrs=['#d8838b','#f4a7ae','#231F20','#6b7280','#86efac','#fca5a5','#fde68a','#bfdbfe','#ddd6fe','#d1fae5','#fee2e2','#fef3c7','#e0e7ff','#f3e8ff','#ecfdf5','#fff7ed'];
        UI.makeChart('chart-cat',{type:'doughnut',data:{labels:catBreakdown.map(c=>c.name),datasets:[{data:catBreakdown.map(c=>c.total),backgroundColor:clrs}]},options:{plugins:{legend:{position:'right',labels:{font:{size:11}}}},responsive:true}});
        const trend=Stock.monthlySummary(f.store||null,6);
        UI.makeChart('chart-trend',{type:'line',data:{labels:trend.map(m=>m.label),datasets:[{label:'IN',data:trend.map(m=>m.ins),borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.08)',tension:.3,fill:true},{label:'OUT',data:trend.map(m=>m.outs),borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,.08)',tension:.3,fill:true}]},options:{plugins:{legend:{position:'bottom'}},responsive:true,scales:{y:{beginAtZero:true}}}});
      },100);
    } else if(this._repTab==='transactions'){
      const shown=txns.slice().reverse().slice(0,500);
      el.innerHTML=`<div class="tbl-wrap card">${!shown.length?'<div class="empty-state"><p>No transactions match.</p></div>':`<table><thead><tr><th>Date</th><th>Store</th><th>Product</th><th>Category</th><th>Type</th><th>Qty</th><th>By</th><th>Reason</th></tr></thead><tbody>${shown.map(t=>{const prod=d.products.find(p=>p.id===t.productId);return `<tr><td>${UI.fmtDate(t.date)}</td><td>${UI.storeName(t.storeId)}</td><td>${UI.productName(t.productId)}</td><td>${UI.catName(prod?.catId)}</td><td>${t.type==='in'?'<span class="badge badge-green">▲ IN</span>':t.type==='return_in'?'<span class="badge" style="background:#fef3c7;color:#92400e;border:1px solid #fbbf24;font-weight:700">↩ RETURN</span>':'<span class="badge badge-red">▼ OUT</span>'}</td><td>${t.qty}</td><td>${t.staffName}</td><td style="color:#6b7280;font-size:.8rem">${t.reason||'—'}</td></tr>`;}).join('')}</tbody></table>`}</div>`;
    } else if(this._repTab==='snapshot'){
      const stores=f.store
        ? (f.store==='head_office' ? [{id:'head_office',name:'Head Office (Warehouse)',type:'warehouse'}] : [d.stores.find(s=>s.id===f.store)]).filter(Boolean)
        : (storeIds
            ? d.stores.filter(s=>s.active&&storeIds.includes(s.id))
            : d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice)));
      let prods=d.products.filter(p=>p.active&&(!f.cat||p.catId===f.cat));
      if(f.pt){const catIds=d.categories.filter(c=>c.ptId===f.pt).map(c=>c.id);prods=prods.filter(p=>catIds.includes(p.catId));}
      el.innerHTML=`<div class="tbl-wrap card"><table><thead><tr><th>Product</th>${stores.map(s=>`<th>${s.name}</th>`).join('')}<th>Total</th></tr></thead><tbody>${prods.map(p=>{const qtys=stores.map(s=>Stock.qty(p.id,s.id));const total=qtys.reduce((a,b)=>a+b,0);return `<tr><td><strong>${p.name}</strong><br><span style="color:#9ca3af;font-size:.7rem">${UI.catName(p.catId)}</span></td>${qtys.map((q,i)=>{const thr=Stock.threshold(p.id,stores[i].id);return `<td>${UI.stockBadge(q,thr?.minQty)}</td>`;}).join('')}<td><strong>${total}</strong></td></tr>`;}).join('')}</tbody></table></div>`;
    } else if(this._repTab==='category'){
      const cats=f.cat?d.categories.filter(c=>c.id===f.cat):d.categories;
      const stores=f.store?[f.store]:(storeIds||d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice)).map(s=>s.id));
      const visibleCats=f.pt?cats.filter(c=>c.ptId===f.pt):cats;
      const rows=visibleCats.map(cat=>{
        const catProds=d.products.filter(p=>p.active&&p.catId===cat.id);
        const catTxns=txns.filter(t=>catProds.map(p=>p.id).includes(t.productId));
        const ins=catTxns.filter(t=>t.type==='in').reduce((a,t)=>a+t.qty,0);
        const outs=catTxns.filter(t=>t.type==='out').reduce((a,t)=>a+t.qty,0);
        const stockNow=catProds.reduce((sum,p)=>sum+stores.reduce((s2,sId)=>s2+Stock.qty(p.id,sId),0),0);
        return `<tr><td><strong>${cat.name}</strong></td><td>${catProds.length}</td><td>${stockNow}</td><td>${ins}</td><td>${outs}</td></tr>`;
      });
      // Build pie data
      const pieColors=['#d8838b','#86efac','#93c5fd','#fbbf24','#c4b5fd','#6ee7b7','#f9a8d4','#fdba74'];
      const getPieData=()=>visibleCats.map((cat,i)=>{
        const catProds=d.products.filter(p=>p.active&&p.catId===cat.id);
        const catTxns=txns.filter(t=>catProds.map(p=>p.id).includes(t.productId));
        return {name:cat.name,out:catTxns.filter(t=>t.type==='out').reduce((a,t)=>a+t.qty,0),color:pieColors[i%pieColors.length]};
      }).filter(c=>c.out>0);
      let pieHtml='';
      if(f.store||f.pt||f.cat){
        const ptName=f.pt?(d.productTypes.find(pt=>pt.id===f.pt)?.name||f.pt):(f.cat?'Selected Category':'All Types');
        const storeName=f.store?(d.stores.find(s=>s.id===f.store)?.name||(f.store==='head_office'?'HO Warehouse':f.store)):'All Stores';
        const pd=getPieData();
        pieHtml=`<div class="card card-body" style="margin-bottom:16px">
          <div style="font-weight:600;margin-bottom:4px">📊 Category Breakdown — ${ptName} at ${storeName}</div>
          <div style="font-size:.75rem;color:#9ca3af;margin-bottom:16px">Stock OUT by category in selected period</div>
          ${pd.length===0?'<p style="color:#9ca3af;text-align:center;padding:24px">No OUT transactions in this period for the selected filters.</p>':`
          <div style="display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:center">
            <canvas id="chart-cat-pie" height="220" style="max-height:220px"></canvas>
            <div>${pd.map(c=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div style="width:12px;height:12px;border-radius:2px;background:${c.color};flex-shrink:0"></div>
              <span style="font-size:.82rem">${c.name}</span>
              <span style="margin-left:auto;font-size:.82rem;font-weight:700">${c.out} units</span>
            </div>`).join('')}</div>
          </div>`}
        </div>`;
      }
      el.innerHTML=pieHtml+`<div class="tbl-wrap card"><table><thead><tr><th>Category</th><th>Products</th><th>Current Stock</th><th>IN (period)</th><th>OUT (period)</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
      if(f.store||f.pt||f.cat){
        setTimeout(()=>{
          const pd=getPieData();
          if(pd.length>0) UI.makeChart('chart-cat-pie',{type:'pie',data:{labels:pd.map(c=>c.name),datasets:[{data:pd.map(c=>c.out),backgroundColor:pd.map(c=>c.color),borderWidth:2,borderColor:'white'}]},options:{plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:false}});
        },100);
      }
    }
  },
    _exportCSV() {
    const f=this._getRepFilters?this._getRepFilters():{};
    let txns=DB.get().transactions;
    if(this._repStoreIds&&!f.store) txns=txns.filter(t=>this._repStoreIds.includes(t.storeId));
    if(f.store) txns=txns.filter(t=>t.storeId===f.store);
    if(f.from)  txns=txns.filter(t=>t.date>=f.from);
    if(f.to)    txns=txns.filter(t=>t.date<=f.to);
    const rows=[['Date','Store','Product ID','Product','Category','Type','Qty','Staff','Reason']];
    txns.forEach(t=>{ const prod=DB.get().products.find(p=>p.id===t.productId); rows.push([t.date,UI.storeName(t.storeId),t.productId,UI.productName(t.productId),UI.catName(prod?.catId),t.type,t.qty,t.staffName,t.reason||'']); });
    this._downloadCSV(rows,'BOB_Transactions_'+new Date().toISOString().slice(0,10)+'.csv');
  },
  _exportStockCSV() {
    const d=DB.get();
    const rows=[['Product ID','Product','Category',...d.stores.filter(s=>s.active).map(s=>s.name)]];
    d.products.filter(p=>p.active).forEach(p=>{
      const row=[p.id,p.name,UI.catName(p.catId)];
      d.stores.filter(s=>s.active).forEach(s=>row.push(Stock.qty(p.id,s.id)));
      rows.push(row);
    });
    this._downloadCSV(rows,'BOB_StockLevels_'+new Date().toISOString().slice(0,10)+'.csv');
  },
  _downloadCSV(rows,filename) {
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=filename; a.click();
    UI.toast('CSV downloaded','success');
  },

  // ── Settings: Products ──
  settingsProducts(elId) {
    const d=DB.get(); const el=document.getElementById(elId||'page-products');
    this._spContainer=el;
    el.innerHTML=`
      <div class="page-header"><div style="display:flex;align-items:center;justify-content:space-between"><div><div class="page-title">Product Management</div><div class="page-sub">${d.products.filter(p=>p.active).length} active products</div></div><button class="btn btn-primary" onclick="Pages._addProductModal()">+ Add Product</button></div></div>
      <div class="filter-row">
        <select class="form-select" id="sp-pt" style="max-width:180px" onchange="Pages._renderProductsTable()"><option value="">All Types</option>${d.productTypes.map(pt=>`<option value="${pt.id}">${pt.name}</option>`).join('')}</select>
        <select class="form-select" id="sp-cat" style="max-width:200px" onchange="Pages._renderProductsTable()"><option value="">All Categories</option>${d.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
        <input class="form-input" id="sp-search" placeholder="Search..." style="max-width:240px" oninput="Pages._renderProductsTable()">
      </div>
      <div class="tbl-wrap card"><div id="sp-table"></div></div>`;
    this._renderProductsTable();
  },
  _renderProductsTable() {
    const d=DB.get();
    const _sp=(id)=>this._spContainer?this._spContainer.querySelector('#'+id):document.getElementById(id);
    const catF=_sp('sp-cat')?.value; const ptF=_sp('sp-pt')?.value; const search=_sp('sp-search')?.value.toLowerCase()||'';
    let prods=d.products.filter(p=>p.active&&(!catF||p.catId===catF)&&(!search||p.name.toLowerCase().includes(search)||p.id.toLowerCase().includes(search)));
    if(ptF){const catIds=d.categories.filter(c=>c.ptId===ptF).map(c=>c.id);prods=prods.filter(p=>catIds.includes(p.catId));}
    const isDir=Auth.is('director'); // only Director sees cost price, not HO Admin
    const franDiscOpts='<option value="">—</option><option value="5">5%</option><option value="10">10%</option><option value="20">20%</option><option value="25">25%</option><option value="50">50%</option><option value="75">75%</option><option value="100">100%</option>';
    _sp('sp-table').innerHTML=`<table><thead><tr><th>Ref</th><th>Product</th><th>Category</th><th>Type</th><th>Sell Price</th>${isDir?'<th>Cost Price</th><th style="min-width:130px">Franchise Discount</th><th>Franchise Price</th>':''}<th>Actions</th></tr></thead><tbody>${prods.map(p=>{
      const costPrice=Stock.currentCost(p.id);
      const franStore=d.stores.find(s=>s.isFranchise&&s.active);
      const discPct=p.franchiseDiscount??franStore?.franchiseDiscount??null;
      const franPrice=p.price&&discPct!=null?p.price*(1-discPct/100):null;
      return `<tr><td style="color:#9ca3af;font-size:.75rem">${p.id}</td><td><strong>${p.name}</strong></td><td>${UI.catName(p.catId)}</td><td><span class="badge badge-rose">${UI.ptName(d.categories.find(c=>c.id===p.catId)?.ptId)}</span></td><td>${p.price?UI.fmt(p.price):(p.internalUse?'<span style="color:#9ca3af;font-size:.75rem">Internal use</span>':'<span style="color:#d97706;font-size:.75rem">⚠ Missing</span>')}</td>${isDir?`<td>${costPrice!==null?`<strong>${UI.fmt(costPrice)}</strong>`:'<span class="badge badge-red" style="font-size:.7rem">Not set</span>'}</td><td><select class="form-select" style="font-size:.75rem;padding:3px 6px;max-width:120px" onchange="Pages._setProductFranDisc('${p.id}',this.value)">${franDiscOpts.replace(`value="${p.franchiseDiscount||''}"`,`value="${p.franchiseDiscount||''}" selected`)}</select>${discPct==null?'<span style="color:#dc2626;font-size:.68rem;margin-left:4px">⚠</span>':''}</td><td>${franPrice?`<span style="color:#7c3aed;font-weight:600">${UI.fmt(franPrice)}</span>`:'<span style="color:#9ca3af">—</span>'}</td>`:''}<td style="display:flex;gap:6px"><button class="btn btn-sm btn-secondary" onclick="Pages._editProductModal('${p.id}')">Edit</button><button class="btn btn-sm btn-danger" onclick="Pages._deleteProduct('${p.id}')">Remove</button></td></tr>`;
    }).join('')}</tbody></table>`;
  },
  _setProductFranDisc(productId, val) {
    val=String(Math.max(0,Math.min(100,parseFloat(val)||0)));
    const d=DB.get(); const p=d.products.find(pr=>pr.id===productId);
    if(p){ p.franchiseDiscount=val?parseFloat(val):null; DB.commit(); UI.toast('Discount updated','success'); this._renderProductsTable(); }
  },
  _addProductModal() {
    const d=DB.get();
    UI.modal('Add Product',`<div class="form-group"><label class="form-label">Product ID *</label><input class="form-input" id="np-id" placeholder="e.g. EXT_22"></div><div class="form-group"><label class="form-label">Product Name *</label><input class="form-input" id="np-name"></div><div class="form-group"><label class="form-label">Category *</label><select class="form-select" id="np-cat">${d.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Sell Price (AUD)</label><input type="number" class="form-input" id="np-price" step="0.01" style="max-width:160px"></div><div class="form-group"><label class="form-label">Franchise Discount</label><select class="form-select" id="np-fran-disc" style="max-width:260px"><option value="">No product-level discount (use store default)</option><option value="5">5% off sell price</option><option value="10">10% off sell price</option><option value="20">20% off sell price</option><option value="25">25% off sell price</option><option value="50">50% off sell price</option><option value="75">75% off sell price</option><option value="100">100% off (free)</option></select><div style="font-size:.72rem;color:#6b7280;margin-top:4px">Overrides the store-level franchise discount for this product.</div></div>`,
      `<button class="btn btn-secondary" onclick="UI.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Pages._saveNewProduct()">Add</button>`);
  },
  _saveNewProduct() {
    const id=document.getElementById('np-id')?.value.trim().toUpperCase(); const name=document.getElementById('np-name')?.value.trim();
    const catId=document.getElementById('np-cat')?.value; const price=parseFloat(document.getElementById('np-price')?.value)||null;
    const franDisc=parseFloat(document.getElementById('np-fran-disc')?.value)||null;
    if(!id||!name){UI.toast('ID and Name required','error');return;}
    const d=DB.get(); if(d.products.find(p=>p.id===id)){UI.toast('Product ID exists','error');return;}
    const _nameLower=name.toLowerCase();
    const _dup=d.products.find(p=>p.active&&p.name.toLowerCase()===_nameLower);
    if(_dup){UI.confirm('Duplicate Product',`A product named "${_dup.name}" already exists. Add anyway?`,()=>Pages._doAddProduct(id,name,catId,price,franDisc),'Add Anyway',false);return;}
    Pages._doAddProduct(id,name,catId,price,franDisc);
  },
  _doAddProduct(id,name,catId,price,franDisc){
    const d=DB.get();
    d.products.push({id,name,catId,price,internalUse:false,weightGrams:null,franchiseDiscount:franDisc,costPrice:null,active:true,freight:null,customs:null,tax:null,supplierName:'',supplierContact:'',leadDays:null});
    DB.commit();
    UI.closeModal(); UI.toast(`"${name}" added`,'success'); Pages._refreshSettings('products');
  },
  _editProductModal(productId) {
    const p=DB.get().products.find(p=>p.id===productId); const d=DB.get();
    UI.modal('Edit Product',`<div class="form-group"><label class="form-label">Product Name *</label><input class="form-input" id="ep-name" value="${p.name}"></div><div class="form-group"><label class="form-label">Category</label><select class="form-select" id="ep-cat">${d.categories.map(c=>`<option value="${c.id}" ${c.id===p.catId?'selected':''}>${c.name}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Sell Price (AUD)</label><input type="number" class="form-input" id="ep-price" value="${p.price||''}" step="0.01" style="max-width:160px"></div><div class="form-group" style="display:flex;align-items:center;gap:10px;margin-top:8px"><input type="checkbox" id="ep-internal" ${p.internalUse?'checked':''} style="width:16px;height:16px;cursor:pointer"><label for="ep-internal" class="form-label" style="margin:0;cursor:pointer">Internal use only (hides sell price warning)</label></div>`,
      `<button class="btn btn-secondary" onclick="UI.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Pages._saveEditProduct('${productId}')">Save</button>`);
  },
  _saveEditProduct(productId) {
    const d=DB.get(); const p=d.products.find(p=>p.id===productId);
    p.name=document.getElementById('ep-name')?.value.trim()||p.name;
    p.catId=document.getElementById('ep-cat')?.value||p.catId;
    p.price=parseFloat(document.getElementById('ep-price')?.value)||null;
    p.internalUse=document.getElementById('ep-internal')?.checked||false;

    DB.commit(); UI.closeModal(); UI.toast('Updated','success'); this._refreshSettings('products');
  },
  _deleteProduct(productId) {
    UI.confirm('Remove Product',`Remove "${UI.productName(productId)}"? This will deactivate the product.`,()=>{
      const d=DB.get(); const p=d.products.find(pr=>pr.id===productId);
      if(p){p.active=false;d.thresholds=d.thresholds.filter(t=>t.productId!==productId);DB.commit();UI.toast('Removed','info');Pages._refreshSettings('products');}
    },'Remove');
  },

  _renderThresholds() {

    const d=DB.get(); const storeId=_th('th-store')?.value; const search=_th('th-search')?.value.toLowerCase()||'';
    const ptF=_th('th-pt')?.value; const catF=_th('th-cat')?.value;
    let prods=d.products.filter(p=>p.active);
    if(ptF){const catIds=d.categories.filter(c=>c.ptId===ptF).map(c=>c.id);prods=prods.filter(p=>catIds.includes(p.catId));}
    if(catF) prods=prods.filter(p=>p.catId===catF);

      return `<tr><td><strong>${p.name}</strong><br><span style="color:#9ca3af;font-size:.7rem">${p.id}</span></td><td>${UI.catName(p.catId)}</td><td>${UI.stockBadge(qty,thr?.minQty)}</td><td><input type="number" class="form-input" value="${thr?.minQty||''}" min="0" placeholder="Not set" style="max-width:100px" id="thr-min-${p.id}" onchange="Pages._saveThr('${p.id}','${storeId}')"></td><td><input type="number" class="form-input" value="${thr?.leadDays||''}" min="0" placeholder="—" style="max-width:80px" id="thr-lead-${p.id}" onchange="Pages._saveThr('${p.id}','${storeId}')"></td><td>${thr?`<button class="btn btn-sm btn-danger" onclick="Pages._removeThr('${p.id}','${storeId}')">Clear</button>`:''}</td></tr>`;
    }).join('')}</tbody></table>`;

  _saveThr(productId,storeId){const minQty=parseInt(document.getElementById('thr-min-'+productId)?.value, 10)||null;const leadDays=parseInt(document.getElementById('thr-lead-'+productId)?.value, 10)||null;if(!minQty)return;const d=DB.get();const idx=d.thresholds.findIndex(t=>t.productId===productId&&t.storeId===storeId);if(idx>=0){d.thresholds[idx].minQty=minQty;d.thresholds[idx].leadDays=leadDays;}else d.thresholds.push({storeId,productId,minQty,leadDays});DB.commit();UI.toast('Saved','success');},

  // ── Director: Settings Hub (consolidated tab) ──
  _downloadCSV(filename, headers, rows) {
    const esc=v=>{const s=String(v==null?'':v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`  :s;};
    const csv=[headers,...rows].map(r=>r.map(esc).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
    UI.toast(`${filename} downloaded`,'success');
  },
  _exportMovementsCSV() {
    const d=DB.get();
    const headers=['Date','Store','Product','Type','Qty','Staff','Reason','From','To','Notes'];
    const rows=d.transactions.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(t=>[
      t.date,
      d.stores.find(s=>s.id===t.storeId)?.name||t.storeId,
      d.products.find(p=>p.id===t.productId)?.name||t.productId,
      t.type==='in'?'IN':t.type==='return_in'?'RETURN IN':'OUT',
      t.qty,t.staffName||'',t.reason||'',t.stockFrom||'',t.stockTo||'',t.note||''
    ]);
    this._downloadCSV(`bob-movements-${new Date().toISOString().slice(0,10)}.csv`,headers,rows);
  },
  _exportStockCSV() {
    const d=DB.get();
    const stores=d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice));
    const headers=['Product','Category','Sell Price',...stores.map(s=>s.name),'HO Warehouse','Total Units'];
    const rows=d.products.filter(p=>p.active).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>{
      const cat=d.categories.find(c=>c.id===p.catId)?.name||'';
      const storeQtys=stores.map(s=>Stock.qty(p.id,s.id));
      const hoQty=Stock.qty(p.id,'head_office');
      const total=storeQtys.reduce((a,b)=>a+b,0)+hoQty;
      return[p.name,cat,p.price!=null?p.price.toFixed(2):'',...storeQtys,hoQty,total];
    });
    this._downloadCSV(`bob-stock-${new Date().toISOString().slice(0,10)}.csv`,headers,rows);
  },
  _exportProductsCSV() {
    const d=DB.get();
    const headers=['ID','Product Name','Category','Type','Sell Price','Franchise Discount','Supplier','Contact','Lead Days'];
    const rows=d.products.filter(p=>p.active).sort((a,b)=>a.name.localeCompare(b.name)).map(p=>{
      const cat=d.categories.find(c=>c.id===p.catId);
      const pt=d.productTypes.find(t=>t.id===cat?.ptId);
      return[p.id,p.name,cat?.name||'',pt?.name||'',p.price!=null?p.price.toFixed(2):'',p.franchiseDiscount?p.franchiseDiscount+'%':'',p.supplierName||'',p.supplierContact||'',p.leadDays||''];
    });
    this._downloadCSV(`bob-products-${new Date().toISOString().slice(0,10)}.csv`,headers,rows);
  },
  _exportWastageCSV() {
    const d=DB.get();
    const headers=['Date','Store','Product','Category','Qty','Reason','Staff','Sell Price','Est. Value Lost'];
    const rows=d.transactions.filter(t=>t.type==='out'&&(t.reason==='Wastage'||t.reason==='Damaged/Expired'||t.stockTo==='Wastage/Damage'))
      .sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
        const p=d.products.find(pr=>pr.id===t.productId);
        const s=d.stores.find(st=>st.id===t.storeId);
        const cat=d.categories.find(c=>c.id===p?.catId);
        const val=(p?.price||0)*t.qty;
        return[t.date,s?.name||t.storeId,p?.name||t.productId,cat?.name||'',t.qty,t.reason||t.stockTo||'',t.staffName||'',p?.price!=null?p.price.toFixed(2):'',val?val.toFixed(2):''];
      });
    this._downloadCSV(`bob-wastage-${new Date().toISOString().slice(0,10)}.csv`,headers,rows);
  },
  _exportBackup() {
    const data=JSON.stringify(DB.get(),null,2);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`bob-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
    UI.toast('Backup downloaded','success');
  },
  _importBackup() {
    const file=document.getElementById('backup-file-input')?.files?.[0];
    if(!file){UI.toast('Please select a backup file','error');return;}
    if(!confirm('⚠️ This will REPLACE all current app data with the backup.\nThis cannot be undone. Continue?'))return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.products||!data.stores||!data.transactions){throw new Error('File does not appear to be a valid BOB backup.');}
        localStorage.setItem(DB.KEY,e.target.result);DB._cache=null;
        UI.toast('Data restored — reloading in 2 seconds...','success');
        setTimeout(()=>location.reload(),2000);
      }catch(err){UI.toast('Restore failed: '+err.message,'error');}
    };
    reader.readAsText(file);
  },
  _dirDataBackup(elId) {
    const el=elId?document.getElementById(elId):null;if(!el)return;
    const d=DB.get();
    const txnCount=d.transactions.length;const prodCount=d.products.filter(p=>p.active).length;

  _dirMargins(elId) {
    const el=elId?document.getElementById(elId):null;if(!el)return;
    const d=DB.get();
    const prods=d.products.filter(p=>p.active).sort((a,b)=>a.name.localeCompare(b.name));
    let totalSell=0,totalCost=0,withCostCount=0;
    const rows=prods.map(p=>{
      const sell=p.price||0;const cost=Stock.currentCost(p.id)||0;
      const hasData=cost>0&&sell>0;
      const margin=hasData?sell-cost:null;
      const pct=hasData?((sell-cost)/sell*100):null;
      if(hasData){totalSell+=sell;totalCost+=cost;withCostCount++;}
      const cat=d.categories.find(c=>c.id===p.catId);
      const marginCell=margin!==null?(margin>=0?`<span style="color:#16a34a;font-weight:600">$${margin.toFixed(2)}</span>`:`<span style="color:#dc2626;font-weight:600">$${margin.toFixed(2)}</span>`):'<span style="color:#d1d5db">—</span>';
      const pctCell=pct!==null?(pct>=0?`<span style="color:#16a34a;font-weight:600">${pct.toFixed(1)}%</span>`:`<span style="color:#dc2626;font-weight:600">${pct.toFixed(1)}%</span>`):'<span style="color:#d1d5db">—</span>';
      return`<tr>
        <td><strong>${p.name}</strong></td>
        <td style="color:#6b7280;font-size:.8rem">${cat?.name||'—'}</td>
        <td>$${sell.toFixed(2)}</td>
        <td>${cost?`<span>$${cost.toFixed(2)}</span>`:'<span style="color:#d1d5db">No data</span>'}</td>
        <td>${marginCell}</td>
        <td>${pctCell}</td>
      </tr>`;
    }).join('');
    const avgMarginPct=withCostCount&&totalSell?((totalSell-totalCost)/totalSell*100).toFixed(1):null;
    el.innerHTML=`
      <div class="page-header"><div><div class="page-title">Margin Report</div><div class="page-sub">Sell price vs. cost price per product — cost data from recorded deliveries</div></div></div>

        <div class="stat-card"><div class="stat-val">$${(totalSell/withCostCount).toFixed(2)}</div><div class="stat-lbl">Avg Sell Price</div></div>
        <div class="stat-card"><div class="stat-val">$${((totalSell-totalCost)/withCostCount).toFixed(2)}</div><div class="stat-lbl">Avg Margin $</div></div>
        <div class="stat-card"><div class="stat-val text-green">${avgMarginPct}%</div><div class="stat-lbl">Avg Margin %</div></div>
      </div>`:''}

        <thead><tr><th>Product</th><th>Category</th><th>Sell Price</th><th>Cost Price</th><th>Margin $</th><th>Margin %</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      ${!withCostCount?'<div class="card card-body" style="margin-top:16px;color:#6b7280;font-size:.875rem">💡 No cost data yet — record deliveries via Cost Management to populate this report.</div>':''}`;

  // ── Reorder List (Director only) ──
  reorderList() {
    if(!Auth.is('director')){navigateTo('dashboard');return;}
    const d=DB.get();const el=document.getElementById('page-reorder');if(!el)return;
    const stores=d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice));
    const items=[];
    d.products.filter(p=>p.active).forEach(p=>{
      stores.forEach(s=>{
        const thr=Stock.threshold(p.id,s.id);if(!thr)return;
        const qty=Stock.qty(p.id,s.id);
        if(qty<=thr.minQty){
          const reorderQty=Math.max(thr.minQty*2-qty,thr.minQty);
          items.push({product:p,store:s,currentQty:qty,minQty:thr.minQty,reorderQty,leadDays:p.leadDays||thr.leadDays||null,supplier:p.supplierName||'',contact:p.supplierContact||''});
        }
      });
    });
    // Group by supplier
    const bySupplier={};
    items.forEach(it=>{const k=it.supplier||'No Supplier';if(!bySupplier[k])bySupplier[k]=[];bySupplier[k].push(it);});
    const exportReorder=()=>{
      const headers=['Supplier','Contact','Product','Store','Current Qty','Min Qty','Reorder Qty','Lead Days'];
      const rows=items.map(it=>[it.supplier||'—',it.contact||'—',it.product.name,it.store.name,it.currentQty,it.minQty,it.reorderQty,it.leadDays||'—']);
      Pages._downloadCSV(`bob-reorder-${new Date().toISOString().slice(0,10)}.csv`,headers,rows);
    };
    el.innerHTML=`
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div><div class="page-title">Reorder List</div><div class="page-sub">Products at or below minimum threshold — suggested order quantities</div></div>
        <button class="btn btn-secondary" onclick="(${exportReorder.toString()})()">⬇ Export CSV</button>
      </div>
      <div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val ${items.length?'text-amber':''}">${items.length}</div><div class="stat-lbl">Items to Reorder</div></div>
        <div class="stat-card"><div class="stat-val">${Object.keys(bySupplier).length}</div><div class="stat-lbl">Suppliers</div></div>
        <div class="stat-card"><div class="stat-val">${items.filter(i=>i.currentQty===0).length}</div><div class="stat-lbl">Out of Stock</div></div>
        <div class="stat-card"><div class="stat-val">${items.reduce((s,i)=>s+i.reorderQty,0)}</div><div class="stat-lbl">Total Units to Order</div></div>
      </div>
      ${!items.length?'<div class="card card-body empty-state"><p>✓ All products are above minimum thresholds. Nothing to reorder.</p></div>':
      Object.entries(bySupplier).sort((a,b)=>a[0].localeCompare(b[0])).map(([sup,sitems])=>`
        <div class="card" style="margin-bottom:16px">
          <div style="padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center">
            <div style="font-weight:700">🚚 ${sup}</div>
            ${sitems[0].contact?`<div style="font-size:.8rem;color:#6b7280">${sitems[0].contact}</div>`:''}
          </div>
          <div class="tbl-wrap"><table class="data-table">
            <thead><tr><th>Product</th><th>Store</th><th>Current</th><th>Min</th><th>Reorder Qty</th><th>Lead Days</th></tr></thead>
            <tbody>${sitems.map(it=>`<tr>
              <td><strong>${it.product.name}</strong></td>
              <td>${it.store.name}</td>
              <td><strong class="${it.currentQty===0?'text-red':'text-amber'}">${it.currentQty}</strong></td>
              <td>${it.minQty}</td>
              <td><strong>${it.reorderQty}</strong></td>
              <td>${it.leadDays?it.leadDays+' days':'—'}</td>
            </tr>`).join('')}</tbody>
          </table></div>
        </div>`).join('')}`;
  },

  // ── Dead Stock / Stock Aging ──
  deadStock() {
    const d=DB.get();const el=document.getElementById('page-dead-stock');if(!el)return;
    const isHO=Auth.isHO();const isMgmt=Auth.isMgmt();
    const myStoreIds=isHO?null:Auth.storeIds();
    const visibleStores=isHO
      ?d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice))
      :d.stores.filter(s=>s.active&&Auth.storeIds().includes(s.id));
    const days=parseInt(document.getElementById('ds-days')?.value, 10)||30;
    const storeFilter=document.getElementById('ds-store-filter')?.value||'';
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    const cutoffStr=cutoff.toISOString().slice(0,10);
    const filterStores=storeFilter?visibleStores.filter(s=>s.id===storeFilter):visibleStores;
    const results=[];
    d.products.filter(p=>p.active).forEach(p=>{
      filterStores.forEach(s=>{
        const qty=Stock.qty(p.id,s.id);if(qty<=0)return;
        const lastOut=d.transactions.filter(t=>t.productId===p.id&&t.storeId===s.id&&t.type==='out').sort((a,b)=>b.date.localeCompare(a.date))[0];
        const lastOutDate=lastOut?.date||null;
        if(!lastOutDate||lastOutDate<cutoffStr){
          const daysSince=lastOutDate?Math.floor((new Date()-new Date(lastOutDate))/86400000):null;
          results.push({product:p,store:s,qty,lastOutDate,daysSince});
        }
      });
    });
    results.sort((a,b)=>(b.daysSince??99999)-(a.daysSince??99999));
    const totalValue=results.reduce((s,r)=>(r.product.price||0)*r.qty+s,0);
    el.innerHTML=`
      <div class="page-header"><div><div class="page-title">Dead Stock / Aging</div><div class="page-sub">Products with stock on hand but no outgoing movement in the selected period</div></div></div>
      <div class="filter-row" style="margin-bottom:16px">
        <select class="form-select" id="ds-days" style="max-width:150px" onchange="Pages.deadStock()">
          <option value="30" ${days===30?'selected':''}>Last 30 days</option>
          <option value="60" ${days===60?'selected':''}>Last 60 days</option>
          <option value="90" ${days===90?'selected':''}>Last 90 days</option>

        </select>`:'<input type="hidden" id="ds-store-filter" value="">'}
      </div>
      <div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val ${results.length?'text-amber':''}">${results.length}</div><div class="stat-lbl">Dead Stock Lines</div></div>
        <div class="stat-card"><div class="stat-val">${results.reduce((s,r)=>s+r.qty,0)}</div><div class="stat-lbl">Total Units Stagnant</div></div>
        <div class="stat-card"><div class="stat-val text-red">$${totalValue.toFixed(2)}</div><div class="stat-lbl">Est. Retail Value Tied Up</div></div>
        <div class="stat-card"><div class="stat-val">${[...new Set(results.map(r=>r.product.id))].length}</div><div class="stat-lbl">Products Affected</div></div>
      </div>
      ${!results.length?'<div class="card card-body empty-state"><p>✓ All stocked products have had recent outgoing movements.</p></div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>Product</th><th>Store</th><th>Qty on Hand</th><th>Est. Value</th><th>Last OUT Date</th><th>Days Stagnant</th></tr></thead>
        <tbody>${results.map(r=>{
          const val=(r.product.price||0)*r.qty;
          const severity=r.daysSince===null?'color:#6b7280':r.daysSince>90?'color:#dc2626;font-weight:700':r.daysSince>60?'color:#f59e0b;font-weight:600':'color:#6b7280';
          return`<tr>
            <td><strong>${r.product.name}</strong></td>
            <td>${r.store.name}</td>
            <td><strong>${r.qty}</strong></td>
            <td>$${val.toFixed(2)}</td>
            <td>${r.lastOutDate||'<span style="color:#9ca3af">Never sold</span>'}</td>

      ?d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice))
      :d.stores.filter(s=>s.active&&Auth.storeIds().includes(s.id));
    const days=parseInt(document.getElementById('str-days')?.value, 10)||30;
    const storeFilter=document.getElementById('str-store')?.value||'';
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    const cutoffStr=cutoff.toISOString().slice(0,10);
    const filterStores=storeFilter?visibleStores.filter(s=>s.id===storeFilter):visibleStores;
    const results=[];
    d.products.filter(p=>p.active).forEach(p=>{
      let totalIn=0,totalOut=0;
      filterStores.forEach(s=>{
        totalIn+=d.transactions.filter(t=>t.productId===p.id&&t.storeId===s.id&&t.type==='in'&&t.date>=cutoffStr).reduce((a,t)=>a+t.qty,0);
        totalOut+=d.transactions.filter(t=>t.productId===p.id&&t.storeId===s.id&&t.type==='out'&&t.date>=cutoffStr).reduce((a,t)=>a+t.qty,0);
      });

    });
    results.sort((a,b)=>(b.rate??-1)-(a.rate??-1));
    const withRate=results.filter(r=>r.rate!==null);
    const avgRate=withRate.length?withRate.reduce((s,r)=>s+r.rate,0)/withRate.length:null;

        <div class="stat-card"><div class="stat-val">${results.reduce((s,r)=>s+r.inQty,0)}</div><div class="stat-lbl">Total Units Received</div></div>
        <div class="stat-card"><div class="stat-val">${results.reduce((s,r)=>s+r.outQty,0)}</div><div class="stat-lbl">Total Units Sold</div></div>
        <div class="stat-card"><div class="stat-val ${avgRate!==null?(avgRate>=70?'text-green':avgRate>=40?'text-amber':'text-red'):''}">${avgRate!==null?avgRate.toFixed(1)+'%':'—'}</div><div class="stat-lbl">Avg Sell-Through</div></div>
      </div>
      ${!results.length?'<div class="card card-body empty-state"><p>No stock movements found in this period.</p></div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>Product</th><th>In (Received)</th><th>Out (Sold)</th><th>Sell-Through %</th><th>Performance</th></tr></thead>
        <tbody>${results.map(r=>{
          const pct=r.rate;const bar=pct!==null?Math.min(Math.round(pct),100):0;
          const color=pct===null?'#d1d5db':pct>=70?'#16a34a':pct>=40?'#f59e0b':'#dc2626';
          const label=pct===null?'<span style="color:#9ca3af">No stock in</span>':pct>=70?'<span style="color:#16a34a">Strong</span>':pct>=40?'<span style="color:#f59e0b">Moderate</span>':'<span style="color:#dc2626">Slow</span>';

  // ── Stock Reconciliation ──
  stockReconciliation() {
    const d=DB.get();const el=document.getElementById('page-reconciliation');if(!el)return;
    const isHO=Auth.isHO();
    const visibleStores=isHO
      ?d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice))
      :d.stores.filter(s=>s.active&&Auth.storeIds().includes(s.id));
    const storeFilter=document.getElementById('recon-store')?.value||'';
    const showAll=document.getElementById('recon-show-all')?.checked;
    const filterStores=storeFilter?visibleStores.filter(s=>s.id===storeFilter):visibleStores;
    // Get the most recent stock take per store
    const latestTakeByStore={};
    d.stockTakes.forEach(take=>{
      if(!filterStores.find(s=>s.id===take.storeId))return;
      if(!latestTakeByStore[take.storeId]||take.date>latestTakeByStore[take.storeId].date)
        latestTakeByStore[take.storeId]=take;
    });
    const results=[];
    Object.values(latestTakeByStore).forEach(take=>{
      const store=visibleStores.find(s=>s.id===take.storeId);if(!store)return;
      take.items.forEach(item=>{
        const product=d.products.find(p=>p.id===item.productId);if(!product||!product.active)return;
        const netAfter=d.transactions.filter(t=>t.productId===item.productId&&t.storeId===take.storeId&&t.date>take.date)
          .reduce((s,t)=>(t.type==='in'||t.type==='return_in')?s+t.qty:s-t.qty,0);
        const expected=item.physicalCount+netAfter;
        const actual=Stock.qty(item.productId,take.storeId);
        const discrepancy=actual-expected;
        if(showAll||discrepancy!==0)results.push({product,store,takeDate:take.date,physicalCount:item.physicalCount,netAfter,expected,actual,discrepancy});
      });
    });
    results.sort((a,b)=>Math.abs(b.discrepancy)-Math.abs(a.discrepancy));
    const discrepCount=results.filter(r=>r.discrepancy!==0).length;
    el.innerHTML=`
      <div class="page-header"><div><div class="page-title">Stock Reconciliation</div><div class="page-sub">Expected stock (from last stock take + movements) vs actual system stock</div></div></div>
      <div class="filter-row" style="margin-bottom:16px">
        ${visibleStores.length>1?`<select class="form-select" id="recon-store" style="max-width:220px" onchange="Pages.stockReconciliation()">
          <option value="">All Stores</option>
          ${visibleStores.map(s=>`<option value="${s.id}"${storeFilter===s.id?' selected':''}>${s.name}</option>`).join('')}
        </select>`:'<input type="hidden" id="recon-store" value="">'}
        <label style="display:flex;align-items:center;gap:6px;font-size:.825rem;cursor:pointer">
          <input type="checkbox" id="recon-show-all" ${showAll?'checked':''} onchange="Pages.stockReconciliation()">Show matched lines too
        </label>
      </div>
      ${!Object.keys(latestTakeByStore).length?'<div class="card card-body empty-state"><p>No stock takes found. Complete a stock take first to enable reconciliation.</p></div>':
      `<div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val">${Object.keys(latestTakeByStore).length}</div><div class="stat-lbl">Stores with Stock Takes</div></div>
        <div class="stat-card"><div class="stat-val">${results.length}</div><div class="stat-lbl">Lines Checked</div></div>
        <div class="stat-card"><div class="stat-val ${discrepCount?'text-red':''}">${discrepCount}</div><div class="stat-lbl">Discrepancies</div></div>
        <div class="stat-card"><div class="stat-val text-green">${results.length-discrepCount}</div><div class="stat-lbl">Matched Lines</div></div>
      </div>
      ${!results.length?'<div class="card card-body empty-state"><p>✓ No discrepancies found.</p></div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>Store</th><th>Product</th><th>Last Take</th><th>Counted</th><th>Movements Since</th><th>Expected</th><th>Actual</th><th>Discrepancy</th></tr></thead>
        <tbody>${results.map(r=>{
          const discColor=r.discrepancy===0?'color:#16a34a':r.discrepancy>0?'color:#f59e0b':'color:#dc2626';
          const discStr=r.discrepancy===0?'✓ Match':r.discrepancy>0?`+${r.discrepancy} surplus`:`${r.discrepancy} shortage`;
          return`<tr>
            <td style="font-size:.8rem">${r.store.name}</td>
            <td><strong>${r.product.name}</strong></td>
            <td style="font-size:.8rem">${r.takeDate}</td>
            <td>${r.physicalCount}</td>
            <td>${r.netAfter>=0?'+':''}<span style="color:${r.netAfter>=0?'#16a34a':'#dc2626'}">${r.netAfter}</span></td>
            <td><strong>${r.expected}</strong></td>
            <td><strong>${r.actual}</strong></td>
            <td><span style="font-weight:700;${discColor}">${discStr}</span></td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>`}`}`;
  },

    const today=new Date().toISOString().slice(0,10);

    const franStores=d.stores.filter(s=>s.active&&s.isFranchise&&!s.isFranchiseOffice);

      const headers=['Franchise Store','Product','Date','Qty','Sell Price','Store Discount %','Product Discount %','Disc Applied','Full Value','Discount Amt','Amount Owed'];

          rows.push([store.name,p?.name||t.productId,t.date,t.qty,sell.toFixed(2),storeDisc+'%',p?.franchiseDiscount!=null?p.franchiseDiscount+'%':'(store default)',prodDisc+'%',full.toFixed(2),discAmt.toFixed(2),(full-discAmt).toFixed(2)]);
        });
      });
      Pages._downloadCSV(`bob-franchise-invoice-${fromDate}-to-${toDate}.csv`,headers,rows);
    };

      const storeDisc=store.franchiseDiscount||0;

      ${!storeData.length?'<div class="card card-body empty-state"><p>No franchise stock movements found in this period.</p></div>':

  // ── Reorder List (Director only) ──
  reorderList() {
    if(!Auth.is('director')){navigateTo('dashboard');return;}
    const d=DB.get();const el=document.getElementById('page-reorder');if(!el)return;
    const stores=d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice));
    const items=[];
    d.products.filter(p=>p.active).forEach(p=>{
      stores.forEach(s=>{
        const thr=Stock.threshold(p.id,s.id);if(!thr)return;
        const qty=Stock.qty(p.id,s.id);
        if(qty<=thr.minQty){
          const reorderQty=Math.max(thr.minQty*2-qty,thr.minQty);
          items.push({product:p,store:s,currentQty:qty,minQty:thr.minQty,reorderQty,leadDays:p.leadDays||thr.leadDays||null,supplier:p.supplierName||'',contact:p.supplierContact||''});
        }
      });
    });
    // Group by supplier
    const bySupplier={};
    items.forEach(it=>{const k=it.supplier||'No Supplier';if(!bySupplier[k])bySupplier[k]=[];bySupplier[k].push(it);});
    const exportReorder=()=>{
      const headers=['Supplier','Contact','Product','Store','Current Qty','Min Qty','Reorder Qty','Lead Days'];
      const rows=items.map(it=>[it.supplier||'—',it.contact||'—',it.product.name,it.store.name,it.currentQty,it.minQty,it.reorderQty,it.leadDays||'—']);
      Pages._downloadCSV(`bob-reorder-${new Date().toISOString().slice(0,10)}.csv`,headers,rows);
    };
    el.innerHTML=`
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div><div class="page-title">Reorder List</div><div class="page-sub">Products at or below minimum threshold — suggested order quantities</div></div>
        <button class="btn btn-secondary" onclick="(${exportReorder.toString()})()">⬇ Export CSV</button>
      </div>
      <div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val ${items.length?'text-amber':''}">${items.length}</div><div class="stat-lbl">Items to Reorder</div></div>
        <div class="stat-card"><div class="stat-val">${Object.keys(bySupplier).length}</div><div class="stat-lbl">Suppliers</div></div>
        <div class="stat-card"><div class="stat-val">${items.filter(i=>i.currentQty===0).length}</div><div class="stat-lbl">Out of Stock</div></div>
        <div class="stat-card"><div class="stat-val">${items.reduce((s,i)=>s+i.reorderQty,0)}</div><div class="stat-lbl">Total Units to Order</div></div>
      </div>
      ${!items.length?'<div class="card card-body empty-state"><p>✓ All products are above minimum thresholds. Nothing to reorder.</p></div>':
      Object.entries(bySupplier).sort((a,b)=>a[0].localeCompare(b[0])).map(([sup,sitems])=>`
        <div class="card" style="margin-bottom:16px">
          <div style="padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center">
            <div style="font-weight:700">🚚 ${sup}</div>
            ${sitems[0].contact?`<div style="font-size:.8rem;color:#6b7280">${sitems[0].contact}</div>`:''}
          </div>
          <div class="tbl-wrap"><table class="data-table">
            <thead><tr><th>Product</th><th>Store</th><th>Current</th><th>Min</th><th>Reorder Qty</th><th>Lead Days</th></tr></thead>
            <tbody>${sitems.map(it=>`<tr>
              <td><strong>${it.product.name}</strong></td>
              <td>${it.store.name}</td>
              <td><strong class="${it.currentQty===0?'text-red':'text-amber'}">${it.currentQty}</strong></td>
              <td>${it.minQty}</td>
              <td><strong>${it.reorderQty}</strong></td>
              <td>${it.leadDays?it.leadDays+' days':'—'}</td>
            </tr>`).join('')}</tbody>
          </table></div>
        </div>`).join('')}`;
  },

  // ── Dead Stock / Stock Aging ──
  deadStock() {
    const d=DB.get();const el=document.getElementById('page-dead-stock');if(!el)return;
    const isHO=Auth.isHO();const isMgmt=Auth.isMgmt();
    const myStoreIds=isHO?null:Auth.storeIds();
    const visibleStores=isHO
      ?d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice))
      :d.stores.filter(s=>s.active&&Auth.storeIds().includes(s.id));
    const days=parseInt(document.getElementById('ds-days')?.value, 10)||30;
    const storeFilter=document.getElementById('ds-store-filter')?.value||'';
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    const cutoffStr=cutoff.toISOString().slice(0,10);
    const filterStores=storeFilter?visibleStores.filter(s=>s.id===storeFilter):visibleStores;
    const results=[];
    d.products.filter(p=>p.active).forEach(p=>{
      filterStores.forEach(s=>{
        const qty=Stock.qty(p.id,s.id);if(qty<=0)return;
        const lastOut=d.transactions.filter(t=>t.productId===p.id&&t.storeId===s.id&&t.type==='out').sort((a,b)=>b.date.localeCompare(a.date))[0];
        const lastOutDate=lastOut?.date||null;
        if(!lastOutDate||lastOutDate<cutoffStr){
          const daysSince=lastOutDate?Math.floor((new Date()-new Date(lastOutDate))/86400000):null;
          results.push({product:p,store:s,qty,lastOutDate,daysSince});
        }
      });
    });
    results.sort((a,b)=>(b.daysSince??99999)-(a.daysSince??99999));
    const totalValue=results.reduce((s,r)=>(r.product.price||0)*r.qty+s,0);
    el.innerHTML=`
      <div class="page-header"><div><div class="page-title">Dead Stock / Aging</div><div class="page-sub">Products with stock on hand but no outgoing movement in the selected period</div></div></div>
      <div class="filter-row" style="margin-bottom:16px">
        <select class="form-select" id="ds-days" style="max-width:150px" onchange="Pages.deadStock()">
          <option value="30" ${days===30?'selected':''}>Last 30 days</option>
          <option value="60" ${days===60?'selected':''}>Last 60 days</option>
          <option value="90" ${days===90?'selected':''}>Last 90 days</option>
        </select>
        ${visibleStores.length>1?`<select class="form-select" id="ds-store-filter" style="max-width:220px" onchange="Pages.deadStock()">
          <option value="">All Stores</option>
          ${visibleStores.map(s=>`<option value="${s.id}"${storeFilter===s.id?' selected':''}>${s.name}</option>`).join('')}
        </select>`:'<input type="hidden" id="ds-store-filter" value="">'}
      </div>
      <div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val ${results.length?'text-amber':''}">${results.length}</div><div class="stat-lbl">Dead Stock Lines</div></div>
        <div class="stat-card"><div class="stat-val">${results.reduce((s,r)=>s+r.qty,0)}</div><div class="stat-lbl">Total Units Stagnant</div></div>
        <div class="stat-card"><div class="stat-val text-red">$${totalValue.toFixed(2)}</div><div class="stat-lbl">Est. Retail Value Tied Up</div></div>
        <div class="stat-card"><div class="stat-val">${[...new Set(results.map(r=>r.product.id))].length}</div><div class="stat-lbl">Products Affected</div></div>
      </div>
      ${!results.length?'<div class="card card-body empty-state"><p>✓ All stocked products have had recent outgoing movements.</p></div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>Product</th><th>Store</th><th>Qty on Hand</th><th>Est. Value</th><th>Last OUT Date</th><th>Days Stagnant</th></tr></thead>
        <tbody>${results.map(r=>{
          const val=(r.product.price||0)*r.qty;
          const severity=r.daysSince===null?'color:#6b7280':r.daysSince>90?'color:#dc2626;font-weight:700':r.daysSince>60?'color:#f59e0b;font-weight:600':'color:#6b7280';
          return`<tr>
            <td><strong>${r.product.name}</strong></td>
            <td>${r.store.name}</td>
            <td><strong>${r.qty}</strong></td>
            <td>$${val.toFixed(2)}</td>
            <td>${r.lastOutDate||'<span style="color:#9ca3af">Never sold</span>'}</td>
            <td><span style="${severity}">${r.daysSince!==null?r.daysSince+' days':'Never'}</span></td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>`}`;
  },

  // ── Sell-Through Rate ──
  sellThrough() {
    const d=DB.get();const el=document.getElementById('page-sell-through');if(!el)return;
    const isHO=Auth.isHO();
    const myStoreIds=isHO?null:Auth.storeIds();
    const visibleStores=isHO
      ?d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice))
      :d.stores.filter(s=>s.active&&Auth.storeIds().includes(s.id));
    const days=parseInt(document.getElementById('str-days')?.value, 10)||30;
    const storeFilter=document.getElementById('str-store')?.value||'';
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    const cutoffStr=cutoff.toISOString().slice(0,10);
    const filterStores=storeFilter?visibleStores.filter(s=>s.id===storeFilter):visibleStores;
    const results=[];
    d.products.filter(p=>p.active).forEach(p=>{
      let totalIn=0,totalOut=0;
      filterStores.forEach(s=>{
        totalIn+=d.transactions.filter(t=>t.productId===p.id&&t.storeId===s.id&&t.type==='in'&&t.date>=cutoffStr).reduce((a,t)=>a+t.qty,0);
        totalOut+=d.transactions.filter(t=>t.productId===p.id&&t.storeId===s.id&&t.type==='out'&&t.date>=cutoffStr).reduce((a,t)=>a+t.qty,0);
      });
      if(totalIn>0||totalOut>0)results.push({product:p,inQty:totalIn,outQty:totalOut,rate:totalIn>0?(totalOut/totalIn*100):null});
    });
    results.sort((a,b)=>(b.rate??-1)-(a.rate??-1));
    const withRate=results.filter(r=>r.rate!==null);
    const avgRate=withRate.length?withRate.reduce((s,r)=>s+r.rate,0)/withRate.length:null;
    el.innerHTML=`
      <div class="page-header"><div><div class="page-title">Sell-Through Rate</div><div class="page-sub">% of received stock that has been sold in the selected period</div></div></div>
      <div class="filter-row" style="margin-bottom:16px">
        <select class="form-select" id="str-days" style="max-width:150px" onchange="Pages.sellThrough()">
          <option value="30" ${days===30?'selected':''}>Last 30 days</option>
          <option value="60" ${days===60?'selected':''}>Last 60 days</option>
          <option value="90" ${days===90?'selected':''}>Last 90 days</option>
        </select>
        ${visibleStores.length>1?`<select class="form-select" id="str-store" style="max-width:220px" onchange="Pages.sellThrough()">
          <option value="">All Stores</option>
          ${visibleStores.map(s=>`<option value="${s.id}"${storeFilter===s.id?' selected':''}>${s.name}</option>`).join('')}
        </select>`:'<input type="hidden" id="str-store" value="">'}
      </div>
      <div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val">${results.length}</div><div class="stat-lbl">Products with Activity</div></div>
        <div class="stat-card"><div class="stat-val">${results.reduce((s,r)=>s+r.inQty,0)}</div><div class="stat-lbl">Total Units Received</div></div>
        <div class="stat-card"><div class="stat-val">${results.reduce((s,r)=>s+r.outQty,0)}</div><div class="stat-lbl">Total Units Sold</div></div>
        <div class="stat-card"><div class="stat-val ${avgRate!==null?(avgRate>=70?'text-green':avgRate>=40?'text-amber':'text-red'):''}">${avgRate!==null?avgRate.toFixed(1)+'%':'—'}</div><div class="stat-lbl">Avg Sell-Through</div></div>
      </div>
      ${!results.length?'<div class="card card-body empty-state"><p>No stock movements found in this period.</p></div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>Product</th><th>In (Received)</th><th>Out (Sold)</th><th>Sell-Through %</th><th>Performance</th></tr></thead>
        <tbody>${results.map(r=>{
          const pct=r.rate;const bar=pct!==null?Math.min(Math.round(pct),100):0;
          const color=pct===null?'#d1d5db':pct>=70?'#16a34a':pct>=40?'#f59e0b':'#dc2626';
          const label=pct===null?'<span style="color:#9ca3af">No stock in</span>':pct>=70?'<span style="color:#16a34a">Strong</span>':pct>=40?'<span style="color:#f59e0b">Moderate</span>':'<span style="color:#dc2626">Slow</span>';
          return`<tr>
            <td><strong>${r.product.name}</strong></td>
            <td>${r.inQty}</td>
            <td>${r.outQty}</td>
            <td><strong>${pct!==null?pct.toFixed(1)+'%':'—'}</strong></td>
            <td style="min-width:140px">${label}${pct!==null?`<div style="background:#f3f4f6;border-radius:4px;height:6px;margin-top:4px"><div style="background:${color};height:6px;border-radius:4px;width:${bar}%"></div></div>`:''}</td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>`}`;
  },

  // ── Stock Reconciliation ──
  stockReconciliation() {
    const d=DB.get();const el=document.getElementById('page-reconciliation');if(!el)return;
    const isHO=Auth.isHO();
    const visibleStores=isHO
      ?d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice))
      :d.stores.filter(s=>s.active&&Auth.storeIds().includes(s.id));

    const showAll=document.getElementById('recon-show-all')?.checked;
    const filterStores=storeFilter?visibleStores.filter(s=>s.id===storeFilter):visibleStores;
    // Get the most recent stock take per store
    const latestTakeByStore={};
    d.stockTakes.forEach(take=>{
      if(!filterStores.find(s=>s.id===take.storeId))return;
      if(!latestTakeByStore[take.storeId]||take.date>latestTakeByStore[take.storeId].date)
        latestTakeByStore[take.storeId]=take;
    });
    const results=[];
    Object.values(latestTakeByStore).forEach(take=>{
      const store=visibleStores.find(s=>s.id===take.storeId);if(!store)return;
      take.items.forEach(item=>{
        const product=d.products.find(p=>p.id===item.productId);if(!product||!product.active)return;
        const netAfter=d.transactions.filter(t=>t.productId===item.productId&&t.storeId===take.storeId&&t.date>take.date)
          .reduce((s,t)=>(t.type==='in'||t.type==='return_in')?s+t.qty:s-t.qty,0);
        const expected=item.physicalCount+netAfter;
        const actual=Stock.qty(item.productId,take.storeId);
        const discrepancy=actual-expected;
        if(showAll||discrepancy!==0)results.push({product,store,takeDate:take.date,physicalCount:item.physicalCount,netAfter,expected,actual,discrepancy});
      });
    });
    results.sort((a,b)=>Math.abs(b.discrepancy)-Math.abs(a.discrepancy));
    const discrepCount=results.filter(r=>r.discrepancy!==0).length;
    el.innerHTML=`
      <div class="page-header"><div><div class="page-title">Stock Reconciliation</div><div class="page-sub">Expected stock (from last stock take + movements) vs actual system stock</div></div></div>
      <div class="filter-row" style="margin-bottom:16px">
        ${visibleStores.length>1?`<select class="form-select" id="recon-store" style="max-width:220px" onchange="Pages.stockReconciliation()">
          <option value="">All Stores</option>
          ${visibleStores.map(s=>`<option value="${s.id}"${storeFilter===s.id?' selected':''}>${s.name}</option>`).join('')}
        </select>`:'<input type="hidden" id="recon-store" value="">'}
        <label style="display:flex;align-items:center;gap:6px;font-size:.825rem;cursor:pointer">
          <input type="checkbox" id="recon-show-all" ${showAll?'checked':''} onchange="Pages.stockReconciliation()">Show matched lines too
        </label>
      </div>
      ${!Object.keys(latestTakeByStore).length?'<div class="card card-body empty-state"><p>No stock takes found. Complete a stock take first to enable reconciliation.</p></div>':
      `<div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val">${Object.keys(latestTakeByStore).length}</div><div class="stat-lbl">Stores with Stock Takes</div></div>
        <div class="stat-card"><div class="stat-val">${results.length}</div><div class="stat-lbl">Lines Checked</div></div>
        <div class="stat-card"><div class="stat-val ${discrepCount?'text-red':''}">${discrepCount}</div><div class="stat-lbl">Discrepancies</div></div>
        <div class="stat-card"><div class="stat-val text-green">${results.length-discrepCount}</div><div class="stat-lbl">Matched Lines</div></div>
      </div>
      ${!results.length?'<div class="card card-body empty-state"><p>✓ No discrepancies found.</p></div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>Store</th><th>Product</th><th>Last Take</th><th>Counted</th><th>Movements Since</th><th>Expected</th><th>Actual</th><th>Discrepancy</th></tr></thead>
        <tbody>${results.map(r=>{
          const discColor=r.discrepancy===0?'color:#16a34a':r.discrepancy>0?'color:#f59e0b':'color:#dc2626';
          const discStr=r.discrepancy===0?'✓ Match':r.discrepancy>0?`+${r.discrepancy} surplus`:`${r.discrepancy} shortage`;
          return`<tr>
            <td style="font-size:.8rem">${r.store.name}</td>
            <td><strong>${r.product.name}</strong></td>
            <td style="font-size:.8rem">${r.takeDate}</td>
            <td>${r.physicalCount}</td>
            <td>${r.netAfter>=0?'+':''}<span style="color:${r.netAfter>=0?'#16a34a':'#dc2626'}">${r.netAfter}</span></td>
            <td><strong>${r.expected}</strong></td>
            <td><strong>${r.actual}</strong></td>
            <td><span style="font-weight:700;${discColor}">${discStr}</span></td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>`}`}`;
  },

  // ── Franchise Invoice Report (Director only) ──
  franchiseInvoice() {
    if(!Auth.is('director')){navigateTo('dashboard');return;}
    const d=DB.get();const el=document.getElementById('page-franchise-invoice');if(!el)return;
    const today=new Date().toISOString().slice(0,10);
    const defaultFrom=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
    const fromDate=document.getElementById('fi-from')?.value||defaultFrom;
    const toDate=document.getElementById('fi-to')?.value||today;
    const franStores=d.stores.filter(s=>s.active&&s.isFranchise&&!s.isFranchiseOffice);
    const exportFI=()=>{
      const headers=['Franchise Store','Product','Date','Qty','Sell Price','Store Discount %','Product Discount %','Disc Applied','Full Value','Discount Amt','Amount Owed'];
      const rows=[];
      franStores.forEach(store=>{
        const storeDisc=store.franchiseDiscount||0;
        d.transactions.filter(t=>t.storeId===store.id&&t.type==='in'&&t.date>=fromDate&&t.date<=toDate).forEach(t=>{
          const p=d.products.find(pr=>pr.id===t.productId);
          const sell=p?.price||0;const prodDisc=p?.franchiseDiscount??storeDisc;
          const full=sell*t.qty;const discAmt=full*(prodDisc/100);
          rows.push([store.name,p?.name||t.productId,t.date,t.qty,sell.toFixed(2),storeDisc+'%',p?.franchiseDiscount!=null?p.franchiseDiscount+'%':'(store default)',prodDisc+'%',full.toFixed(2),discAmt.toFixed(2),(full-discAmt).toFixed(2)]);
        });
      });
      Pages._downloadCSV(`bob-franchise-invoice-${fromDate}-to-${toDate}.csv`,headers,rows);
    };
    const storeData=franStores.map(store=>{
      const storeDisc=store.franchiseDiscount||0;
      const lines=d.transactions.filter(t=>t.storeId===store.id&&t.type==='in'&&t.date>=fromDate&&t.date<=toDate).map(t=>{
        const p=d.products.find(pr=>pr.id===t.productId);
        const sell=p?.price||0;const prodDisc=p?.franchiseDiscount??storeDisc;
        const full=sell*t.qty;const discAmt=full*(prodDisc/100);
        return{product:p,date:t.date,qty:t.qty,sell,prodDisc,full,discAmt,owed:full-discAmt};
      });
      const totalFull=lines.reduce((s,l)=>s+l.full,0);
      const totalDisc=lines.reduce((s,l)=>s+l.discAmt,0);
      const totalOwed=lines.reduce((s,l)=>s+l.owed,0);
      return{store,lines,totalFull,totalDisc,totalOwed,storeDisc};
    }).filter(sd=>sd.lines.length>0);
    const grandFull=storeData.reduce((s,sd)=>s+sd.totalFull,0);
    const grandDisc=storeData.reduce((s,sd)=>s+sd.totalDisc,0);
    const grandOwed=storeData.reduce((s,sd)=>s+sd.totalOwed,0);
    el.innerHTML=`
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">

        <div><label class="form-label">From</label><input type="date" class="form-input" id="fi-from" value="${fromDate}" onchange="Pages.franchiseInvoice()" style="max-width:160px"></div>
        <div><label class="form-label">To</label><input type="date" class="form-input" id="fi-to" value="${toDate}" onchange="Pages.franchiseInvoice()" style="max-width:160px"></div>
      </div>
      <div class="grid-4" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-val">${storeData.length}</div><div class="stat-lbl">Franchise Stores Active</div></div>
        <div class="stat-card"><div class="stat-val">$${grandFull.toFixed(2)}</div><div class="stat-lbl">Total Retail Value</div></div>
        <div class="stat-card"><div class="stat-val text-green">$${grandDisc.toFixed(2)}</div><div class="stat-lbl">Total Discount Given</div></div>
        <div class="stat-card"><div class="stat-val">$${grandOwed.toFixed(2)}</div><div class="stat-lbl">Total Amount Owed</div></div>
      </div>
      ${!storeData.length?'<div class="card card-body empty-state"><p>No franchise stock movements found in this period.</p></div>':
      storeData.map(sd=>`
        <div class="card" style="margin-bottom:16px">
          <div style="padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <div style="font-weight:700;font-size:1rem">${sd.store.name} <span style="font-size:.75rem;color:#6b7280;font-weight:400">— Store discount: ${sd.storeDisc}%</span></div>
            <div style="display:flex;gap:16px;font-size:.825rem">
              <span>Retail: <strong>$${sd.totalFull.toFixed(2)}</strong></span>
              <span style="color:#16a34a">Discount: <strong>-$${sd.totalDisc.toFixed(2)}</strong></span>
              <span style="font-weight:700">Owed: $${sd.totalOwed.toFixed(2)}</span>
            </div>
          </div>
          <div style="overflow-x:auto"><table class="data-table">
            <thead><tr><th>Date</th><th>Product</th><th>Qty</th><th>Sell Price</th><th>Disc %</th><th>Full Value</th><th>Discount</th><th>Amount Owed</th></tr></thead>
            <tbody>${sd.lines.map(l=>`<tr>
              <td>${l.date}</td>
              <td><strong>${l.product?.name||'—'}</strong></td>
              <td>${l.qty}</td>
              <td>$${l.sell.toFixed(2)}</td>
              <td>${l.prodDisc}%</td>
              <td>$${l.full.toFixed(2)}</td>
              <td style="color:#16a34a">-$${l.discAmt.toFixed(2)}</td>
              <td><strong>$${l.owed.toFixed(2)}</strong></td>
            </tr>`).join('')}
            <tr style="background:#f9fafb;font-weight:700">
              <td colspan="5" style="text-align:right;color:#6b7280">TOTAL</td>
              <td>$${sd.totalFull.toFixed(2)}</td>
              <td style="color:#16a34a">-$${sd.totalDisc.toFixed(2)}</td>
              <td>$${sd.totalOwed.toFixed(2)}</td>
            </tr></tbody>
          </table></div>
        </div>`).join('')}`;
  },
