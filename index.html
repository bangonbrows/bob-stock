  _renderCostTable(){
    const d=DB.get();
    let prods=d.products.filter(p=>p.active);
    const ptF=document.getElementById('dc-pt')?.value;
    const catF=document.getElementById('dc-cat')?.value;
    const search=document.getElementById('dc-search')?.value.toLowerCase()||'';
    if(ptF){const catIds=d.categories.filter(c=>c.ptId===ptF).map(c=>c.id);prods=prods.filter(p=>catIds.includes(p.catId));}
    if(catF) prods=prods.filter(p=>p.catId===catF);
    if(search) prods=prods.filter(p=>p.name.toLowerCase().includes(search)||p.id.toLowerCase().includes(search));
    document.getElementById('dc-table').innerHTML=`<table><thead><tr><th>Product</th><th>Category</th><th>Sell Price</th><th>Current Cost</th><th>Margin</th><th>History</th><th>Actions</th></tr></thead><tbody>${prods.map(p=>{
      const currCost=Stock.currentCost(p.id);
      const margin=currCost!==null&&p.sellPrice?((p.sellPrice-currCost)/p.sellPrice*100).toFixed(1):null;
      const histCount=(d.costHistory||[]).filter(h=>h.productId===p.id).length;
      return `<tr>
        <td><strong>${p.name}</strong><br><span style="color:#9ca3af;font-size:.7rem">${p.id}</span></td>
        <td>${UI.catName(p.catId)}</td>
        <td>${p.sellPrice?UI.fmt(p.sellPrice):'<span style="color:#9ca3af">—</span>'}</td>
        <td>${currCost!==null?`<strong>${UI.fmt(currCost)}</strong>`:'<span class="badge badge-red">No cost</span>'}</td>
        <td>${margin!==null?`<span class="badge ${parseFloat(margin)>40?'badge-green':parseFloat(margin)>20?'badge-amber':'badge-red'}">${margin}%</span>`:'—'}</td>
        <td>${histCount>0?`<span class="badge badge-blue">${histCount} entries</span>`:'<span style="color:#9ca3af">None</span>'}</td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-sm btn-primary" onclick="Pages._addCostModal('${p.id}')">+ Cost</button>
          ${histCount>0?`<button class="btn btn-sm btn-secondary" onclick="Pages._viewCostHistory('${p.id}')">History</button>`:''}
        </td>
      </tr>`;
    }).join('')}</tbody></table>`;
  },
  _addCostModal(productId){
    const p=DB.get().products.find(p=>p.id===productId);
    const currCost=Stock.currentCost(productId);
    UI.modal(`Add Cost Entry — ${p.name}`,`
      <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px;margin-bottom:16px;font-size:.85rem">
        <strong>How this works:</strong> Each cost entry records the unit cost for a specific date (e.g., a new shipment arriving at a different price). The most recent entry on or before any transaction date is used for profit calculations.
        ${currCost!==null?`<br><span style="color:#6b7280;margin-top:4px;display:block">Current cost: <strong>${UI.fmt(currCost)}</strong></span>`:''}
      </div>
      <div class="form-group"><label class="form-label">Effective Date *</label><input type="date" class="form-input" id="nc-date" value="${new Date().toISOString().split('T')[0]}" style="max-width:180px"></div>
      <div class="form-group"><label class="form-label">Cost Price (per unit) *</label><div style="display:flex;align-items:center;gap:8px"><span style="font-size:1.1rem;color:#6b7280">$</span><input type="number" class="form-input" id="nc-cost" min="0" step="0.01" placeholder="0.00" style="max-width:130px"></div></div>
      <div class="form-group"><label class="form-label">Supplier / Notes</label><input class="form-input" id="nc-notes" placeholder="e.g. Jan shipment from ABC Supplier"></div>`,
    `<button class="btn btn-secondary" onclick="UI.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Pages._saveCostEntry('${productId}')">Save Entry</button>`);
  },
  _saveCostEntry(productId){
    const date=document.getElementById('nc-date')?.value;
    const cost=parseFloat(document.getElementById('nc-cost')?.value);
    const notes=document.getElementById('nc-notes')?.value.trim()||'';
    if(!date||isNaN(cost)||cost<0){UI.toast('Date and valid cost required','error');return;}
    const d=DB.get();
    if(!d.costHistory) d.costHistory=[];
    d.costHistory.push({id:'ch_'+Date.now(),productId,date,costPrice:cost,notes});
    // Also update product.costPrice to latest
    const prod=d.products.find(p=>p.id===productId);
    if(prod) prod.costPrice=cost;
    DB.commit();
    UI.closeModal();
    UI.toast(`Cost entry added: ${UI.fmt(cost)} effective ${date}`,'success');
    this._renderCostTable();
  },
  _viewCostHistory(productId){
    const d=DB.get();
    const p=d.products.find(p=>p.id===productId);
    const hist=(d.costHistory||[]).filter(h=>h.productId===productId).sort((a,b)=>b.date.localeCompare(a.date));
    UI.modal(`Cost History — ${p.name}`,`
      <div style="margin-bottom:12px;font-size:.85rem;color:#6b7280">Most recent entry is used as current cost. Earlier entries are used for historical profit calculations.</div>
      ${hist.length===0?'<p style="color:#9ca3af;text-align:center;padding:20px">No history</p>':
      hist.map(h=>`<div class="cost-history-item">
        <div>
          <div style="font-weight:700;font-size:.95rem">${UI.fmt(h.costPrice)}</div>
          ${h.notes?`<div style="font-size:.78rem;color:#6b7280;margin-top:2px">${h.notes}</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:.8rem;color:#6b7280">${h.date}</div>
          <button class="btn btn-sm btn-danger" style="margin-top:4px" onclick="Pages._deleteCostEntry('${h.id}','${productId}')">Remove</button>
        </div>
      </div>`).join('')}`,
    '<button class="btn btn-secondary" onclick="UI.closeModal()">Close</button>');
  },
  _deleteCostEntry(entryId, productId){
    if(!confirm('Remove this cost entry?'))return;
    const d=DB.get();
    d.costHistory=(d.costHistory||[]).filter(h=>h.id!==entryId);
    // Recalculate product.costPrice to most recent remaining
    const latest=(d.costHistory||[]).filter(h=>h.productId===productId).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const prod=d.products.find(p=>p.id===productId);
    if(prod) prod.costPrice=latest?.costPrice||null;
    DB.commit();
    UI.closeModal();
    UI.toast('Entry removed','info');
    this.directorCosts();
  },

  _renderDeliveryLines(prodOptions){

          <td style="padding:6px 8px"><input type="number" class="form-input" value="${ln.weightGrams||''}" min="0" step="1" placeholder="g" style="width:80px;text-align:center" onchange="Pages._delLines[${i}].weightGrams=parseInt(this.value, 10)||0;Pages._updateDeliveryCalc()"></td>

          <td style="padding:6px 8px"><input type="number" class="form-input" value="${ln.labelling||0}" min="0" step="0.01" style="width:100px;text-align:center" onchange="Pages._delLines[${i}].labelling=parseFloat(this.value)||0;Pages._updateDeliveryCalc()"></td>

  _addDeliveryLine(){
    if(!this._delLines)this._delLines=[];
    this._delLines.push({productId:'',qty:1,unitCost:0,weightGrams:0,packaging:0,labelling:0});
    this._renderDeliveryLines();
    this._updateDeliveryCalc();
  },
  _removeDeliveryLine(i){
    this._delLines.splice(i,1);
    this._renderDeliveryLines();
    this._updateDeliveryCalc();
  },
  _updateDeliveryCalc(){
    const freight=parseFloat(document.getElementById('del-freight')?.value)||0;
    const tax=parseFloat(document.getElementById('del-tax')?.value)||0;
    const customs=parseFloat(document.getElementById('del-customs')?.value)||0;
    const totalHeader=freight+tax+customs;
    const htEl=document.getElementById('del-header-total');
    if(htEl)htEl.textContent=`Total header costs: $${totalHeader.toFixed(2)}`;
    const lines=this._delLines||[];
    const totalLineVal=lines.reduce((a,ln)=>a+(ln.unitCost||0)*(ln.qty||1),0);
    const summaryEl=document.getElementById('del-summary');
    const summaryRows=document.getElementById('del-summary-rows');
    let hasValidLine=false;
    // Weight-based allocation: freight+customs by weight, tax by value; fallback to value if weights missing
    const validLinesForCalc=lines.filter(ln=>ln.productId&&ln.qty&&ln.unitCost);
    const allHaveWeight=validLinesForCalc.length>0&&validLinesForCalc.every(ln=>(ln.weightGrams||0)>0);
    const totalWeight=allHaveWeight?validLinesForCalc.reduce((a,ln)=>(ln.weightGrams||0)*(ln.qty||1)+a,0):0;
    lines.forEach((ln,i)=>{
      if(!ln.productId||!ln.qty||!ln.unitCost){
        const el=document.getElementById('del-landed-'+i);
        if(el)el.innerHTML='<span style="color:#9ca3af;font-size:.8rem">—</span>';
        return;
      }
      hasValidLine=true;
      const lineVal=(ln.unitCost||0)*(ln.qty||1);
      const lineWeight=(ln.weightGrams||0)*(ln.qty||1);
      // Freight+customs: weight-based if all have weight, else value-based
      const freightCustoms=freight+customs;
      const freightCustomsShare=allHaveWeight&&totalWeight>0?(lineWeight/totalWeight)*freightCustoms:(totalLineVal>0?(lineVal/totalLineVal)*freightCustoms:0);
      // Tax: value-based
      const taxShare=totalLineVal>0?(lineVal/totalLineVal)*tax:0;
      const headerShare=freightCustomsShare+taxShare;
      const landedTotal=lineVal+(ln.packaging||0)+(ln.labelling||0)+headerShare;
      const landedPerUnit=landedTotal/(ln.qty||1);
      ln._landed=landedPerUnit; ln._headerShare=headerShare;
      const el=document.getElementById('del-landed-'+i);
      if(el)el.innerHTML=`<strong style="color:#16a34a">$${landedPerUnit.toFixed(2)}</strong>${allHaveWeight?'':freight+customs>0?'<br><span style="font-size:.65rem;color:#d97706">⚠ add weights for precise split</span>':''}`;
    });
    if(summaryEl){summaryEl.style.display=hasValidLine?'block':'none';}
    if(summaryRows&&hasValidLine){
      const d=DB.get();
      summaryRows.innerHTML=lines.filter(ln=>ln.productId&&ln._landed).map(ln=>{
        const p=d.products.find(pr=>pr.id===ln.productId);
        const currCost=Stock.currentCost(ln.productId);
        const willUpdate=currCost===null||ln._landed>currCost;
        return `<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:.82rem">
          <span style="flex:1;font-weight:600">${p?.name||ln.productId}</span>
          <span>Landed: <strong>$${ln._landed.toFixed(2)}/unit</strong></span>
          <span>Current: ${currCost!==null?'$'+currCost.toFixed(2):'none'}</span>
          <span style="padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600;${willUpdate?'background:#dcfce7;color:#16a34a':'background:#fef9c3;color:#a16207'}">${willUpdate?'↑ Will UPDATE cost':'→ Keep existing cost'}</span>
        </div>`;
      }).join('');
    }
  },
  _saveDelivery(){
    const supplier=(document.getElementById('del-supplier')?.value||'').trim();
    const date=document.getElementById('del-date')?.value;
    const invoiceNo=(document.getElementById('del-invoice')?.value||'').trim();
    if(!supplier||!date){UI.toast('Supplier and date are required','error');return;}
    const lines=this._delLines||[];
    const validLines=lines.filter(ln=>ln.productId&&ln.qty&&ln.unitCost);
    if(!validLines.length){UI.toast('Add at least one complete product line','error');return;}
    if(lines.some(ln=>ln.productId&&ln.qty<=0)){UI.toast('All product quantities must be greater than zero','error');return;}
    const freight=parseFloat(document.getElementById('del-freight')?.value)||0;
    const tax=parseFloat(document.getElementById('del-tax')?.value)||0;
    const customs=parseFloat(document.getElementById('del-customs')?.value)||0;
    if(freight<0||tax<0||customs<0){UI.toast('Header costs cannot be negative','error');return;}
    const totalHeader=freight+tax+customs;
    const totalLineVal=validLines.reduce((a,ln)=>a+ln.unitCost*ln.qty,0);
    const d=DB.get();
    if(!d.deliveries)d.deliveries=[];
    if(!d.costHistory)d.costHistory=[];
    const delivery={
      id:'del_'+Date.now(), supplier, date, invoiceNo,
      headerCosts:{freight,tax,customs},
      lines:[],
      createdAt:new Date().toISOString(),
      createdBy:Auth.user()?.username||'director'
    };
    const allHaveWeightSave=validLines.every(ln=>(ln.weightGrams||0)>0);
    const totalWeightSave=allHaveWeightSave?validLines.reduce((a,ln)=>(ln.weightGrams||0)*ln.qty+a,0):0;
    validLines.forEach(ln=>{
      const lineVal=ln.unitCost*ln.qty;
      const lineWeight=(ln.weightGrams||0)*ln.qty;
      const freightCustoms=freight+customs;
      const freightCustomsShare=allHaveWeightSave&&totalWeightSave>0?(lineWeight/totalWeightSave)*freightCustoms:(totalLineVal>0?(lineVal/totalLineVal)*freightCustoms:0);
      const taxShare=totalLineVal>0?(lineVal/totalLineVal)*tax:0;
      const headerShare=freightCustomsShare+taxShare;
      const landedTotal=lineVal+(ln.packaging||0)+(ln.labelling||0)+headerShare;
      const landedPerUnit=landedTotal/ln.qty;
      const prevCost=Stock.currentCost(ln.productId);
      const willUpdate=prevCost===null||landedPerUnit>prevCost;
      const appliedCost=willUpdate?landedPerUnit:(prevCost||landedPerUnit);
      delivery.lines.push({productId:ln.productId,quantity:ln.qty,unitCost:ln.unitCost,weightGrams:ln.weightGrams||0,packaging:ln.packaging||0,labelling:ln.labelling||0,headerCostShare:Math.round(headerShare*100)/100,landedCostPerUnit:Math.round(landedPerUnit*100)/100,previousCost:prevCost,appliedCost:Math.round(appliedCost*100)/100,costUpdated:willUpdate,packagingUpdatedAt:null});
      if(willUpdate){
        d.costHistory.push({id:'ch_'+Date.now()+'_'+ln.productId,productId:ln.productId,date,costPrice:Math.round(landedPerUnit*100)/100,notes:`Delivery: ${supplier}${invoiceNo?' #'+invoiceNo:''} — landed cost (incl. freight, tax, customs, packaging, labelling)`,deliveryId:delivery.id});
        const prod=d.products.find(p=>p.id===ln.productId);
        if(prod)prod.costPrice=Math.round(landedPerUnit*100)/100;
      }
      // Create stock-in transaction
      d.transactions.push({id:'tx_'+Date.now()+'_'+Math.random().toString(36).slice(2),date,storeId:'head_office',productId:ln.productId,type:'in',qty:ln.qty,by:Auth.user()?.username||'director',note:`Delivery from ${supplier}${invoiceNo?' #'+invoiceNo:''}`});
    });
    d.deliveries.push(delivery);
    DB.commit();
    document.getElementById('delivery-overlay')?.remove();
    UI.toast(`Delivery recorded — ${validLines.length} product${validLines.length>1?'s':''} added to HO Warehouse`,'success');
    Pages.directorCosts();
  },

  _saveDeliveryPackaging(deliveryId){
    const d=DB.get();
    const del=d.deliveries.find(dv=>dv.id===deliveryId);
    if(!del)return;
    const totalLineVal=del.lines.reduce((a,ln)=>a+ln.unitCost*ln.quantity,0);
    const totalHeader=Object.values(del.headerCosts).reduce((a,v)=>a+v,0);
    const updatedAt=new Date().toISOString();
    del.lines.forEach((ln,i)=>{
      const newPkg=parseFloat(document.getElementById('epkg-'+i)?.value)||0;
      const newLab=parseFloat(document.getElementById('elab-'+i)?.value)||0;
      if(newPkg===ln.packaging&&newLab===ln.labelling)return;
      ln.packaging=newPkg; ln.labelling=newLab; ln.packagingUpdatedAt=updatedAt;
      // Recalculate
      const lineVal=ln.unitCost*ln.quantity;
      const headerShare=totalLineVal>0?(lineVal/totalLineVal)*totalHeader:0;
      const landedTotal=lineVal+newPkg+newLab+headerShare;
      const newLanded=Math.round((landedTotal/ln.quantity)*100)/100;
      ln.landedCostPerUnit=newLanded; ln.headerCostShare=Math.round(headerShare*100)/100;
      // Higher-wins on recalc
      const prevCost=ln.previousCost;
      if(prevCost===null||newLanded>prevCost){
        ln.costUpdated=true; ln.appliedCost=newLanded;
        if(!d.costHistory)d.costHistory=[];
        d.costHistory.push({id:'ch_'+Date.now()+'_'+ln.productId,productId:ln.productId,date:del.date,costPrice:newLanded,notes:`Delivery ${del.supplier}${del.invoiceNo?' #'+del.invoiceNo:''} — packaging/labelling updated ${updatedAt.slice(0,10)}`,deliveryId});
        const prod=d.products.find(p=>p.id===ln.productId);
        if(prod)prod.costPrice=newLanded;
      }
    });
    DB.commit();
    UI.closeModal();
    UI.toast('Packaging & labelling updated — costs recalculated','success');
    this._renderDeliveryHistory();
  },

  _promptStockTakePin() {

  _verifyStockTakePin(){
    const d=DB.get(); const pinCfg=d.stockTakePin||{};
    const entered=document.getElementById('st-pin-inp')?.value;
    const now=Date.now();
    if(!pinCfg.expiresAt||new Date(pinCfg.expiresAt).getTime()<now){
      document.getElementById('st-pin-err').textContent='PIN has expired. Contact your manager.';return;
    }
    if(entered!==pinCfg.pin){
      document.getElementById('st-pin-err').textContent='Incorrect PIN. Try again.';return;
    }
    _stTakeUnlocked=true;
    UI.toast('Stock Take unlocked','success');
    navigateTo('stock-take');

  _manageStockTakePinPanel(){
    const d=DB.get(); const pinCfg=d.stockTakePin||{};
    const now=Date.now();
    const active=pinCfg.pin&&pinCfg.expiresAt&&new Date(pinCfg.expiresAt).getTime()>now;
    const expiresStr=pinCfg.expiresAt?new Date(pinCfg.expiresAt).toLocaleString('en-AU'):'—';

  _setStockTakePin(){
    const pin=document.getElementById('new-st-pin')?.value.trim();
    if(!pin||pin.length<4){UI.toast('PIN must be 4-8 digits','error');return;}
    if(!/^\d+$/.test(pin)){UI.toast('PIN must contain only numbers','error');return;}
    const d=DB.get();
    const expiresAt=new Date(Date.now()+24*60*60*1000).toISOString();
    d.stockTakePin={pin,expiresAt};
    DB.commit(); UI.toast(`PIN set: ${pin} (valid 24h)`,'success'); this._refreshSettings('users');
  },
  _clearStockTakePin(){
    if(!confirm('Clear the Stock Take PIN? Staff will be locked out.'))return;
    const d=DB.get(); d.stockTakePin={pin:null,expiresAt:null};

    if(!this._hsStoreIds) this._hsStoreIds=[];

    const visibleStores=isFran?d.stores.filter(s=>s.active&&storeIds.includes(s.id)):d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice));

}
function sideLink(page, label, icon, targetPageId){
  return `<a class="nav-item" onclick="navigateTo('${page}')" data-page="${page}">${icon}<span>${label}</span></a>`;
}

// ── Mobile Nav Builder ──
function buildMobileNav() {
  const u=Auth.user(); if(!u) return;
  const role=u.role;
  const isFran=role==='franchisee';
  const isStaff=role==='staff';
  const isStoreLevel=(role==='staff'||role==='store_manager'||isFran);
  const isHO=(role==='head_office'||role==='director');
  const el=document.getElementById('mobile-nav'); if(!el) return;

  let items=[];
  if(isFran){
    items=[
      {page:'log-movement',icon:iconArrows(),label:'Log'},
      {page:'ho-stock',icon:iconBox(),label:'Stock'},
      {page:'ho-alerts',icon:iconBell(),label:'Alerts'},
      {page:'ho-movements',icon:iconList(),label:'Moves'},
      {page:'stock-take',icon:iconClipboard(),label:'Take'},
    ];
  } else if(role==='store_manager'){
    items=[
      {page:'log-movement',icon:iconArrows(),label:'Log'},
      {page:'store-stock',icon:iconBox(),label:'Stock'},
      {page:'store-alerts',icon:iconBell(),label:'Alerts'},
      {page:'store-history',icon:iconList(),label:'Moves'},
      {page:'stock-take',icon:iconClipboard(),label:'Take'},
    ];
  } else if(isStaff){
    items=[
      {page:'log-movement',icon:iconArrows(),label:'Log'},
      {page:'store-stock',icon:iconBox(),label:'Stock'},
      {page:'stock-take',icon:iconClipboard(),label:'Take'},
    ];
  } else if(isHO){
    items=[
      {page:'log-movement',icon:iconArrows(),label:'Log'},
      {page:'ho-stock',icon:iconBox(),label:'Stock'},
      {page:'ho-alerts',icon:iconBell(),label:'Alerts'},
      {page:'ho-movements',icon:iconList(),label:'Moves'},
      {page:'ho-reports',icon:iconChart(),label:'Reports'},
    ];
  } else {
    items=[
      {page:'log-movement',icon:iconArrows(),label:'Log'},

      {page:'ho-alerts',icon:iconBell(),label:'Alerts'},
      {page:'ho-movements',icon:iconList(),label:'Moves'},
      {page:'ho-comparison',icon:iconCompare(),label:'Compare'},

}

// ── Page Router ──
function navigateTo(page) {
  // Hide all pages
  document.querySelectorAll('.page').forEach(s=>s.classList.remove('active'));
  // Deactivate all nav links
  document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(a=>a.classList.remove('active'));
  // Mark active nav
  document.querySelectorAll(`[data-page="${page}"]`).forEach(a=>a.classList.add('active'));

  const role=Auth.user()?.role||'';

  // Route map: page key → {sectionId, renderer}
  const routes = {
    'log-movement':       {id:'page-log-movement',  fn:()=>Pages.logMovement()},
    'store-stock':        {id:'page-store-stock',    fn:()=>Pages.storeStock()},
    'store-history':      {id:'page-store-history',  fn:()=>Pages.storeHistory()},
    'stock-take':         {id:'page-stocktake',      fn:()=>{
      if(Auth.user()?.role==='staff'&&!_stTakeUnlocked){Pages._promptStockTakePin();return;}
      Pages.stockTake();
    }},
    'store-alerts':       {id:'page-alerts',         fn:()=>Pages.hoAlerts(Auth.storeIds())},
    'store-comparison':   {id:'page-comparison',     fn:()=>Pages.hoComparison()},
    'store-reports':      {id:'page-reports',        fn:()=>Pages.hoReports()},
    'ho-alerts':          {id:'page-alerts',         fn:()=>Pages.hoAlerts()},
    'ho-stock':           {id:'page-all-stock',      fn:()=>Pages.hoStock()},
    'ho-movements':       {id:'page-all-movements',  fn:()=>Pages.hoMovements()},
    'ho-comparison':      {id:'page-comparison',     fn:()=>Pages.hoComparison()},
    'ho-reports':         {id:'page-reports',        fn:()=>Pages.hoReports()},
    'settings-products':  {id:'page-products',       fn:()=>{Pages._dsTab=null;Pages.settingsProducts();}},
    'settings-categories':{id:'page-categories',     fn:()=>{Pages._dsTab=null;Pages.settingsCategories();}},
    'settings-stores':    {id:'page-stores',         fn:()=>{Pages._dsTab=null;Pages.settingsStores();}},
    'settings-thresholds':{id:'page-thresholds',     fn:()=>{Pages._dsTab=null;Pages.settingsThresholds();}},
    'dir-users':          {id:'page-users',          fn:()=>{Pages._dsTab=null;Pages.directorUsers();}},
    'dir-costs':          {id:'page-costs',          fn:()=>Pages.directorCosts()},
    'dir-wastage':        {id:'page-wastage',        fn:()=>Pages.dirWastage()},
    'dashboard':          {id:'page-dashboard',      fn:()=>Pages.dashboard()},
    'reorder':            {id:'page-reorder',        fn:()=>Pages.reorderList()},
    'audit-log':          {id:'page-audit-log',      fn:()=>Pages.auditLog()},
    'dead-stock':         {id:'page-dead-stock',     fn:()=>Pages.deadStock()},
    'sell-through':       {id:'page-sell-through',   fn:()=>Pages.sellThrough()},
    'reconciliation':     {id:'page-reconciliation', fn:()=>Pages.stockReconciliation()},
    'franchise-invoice':  {id:'page-franchise-invoice',fn:()=>Pages.franchiseInvoice()},
    'dir-settings':       {id:'page-dir-settings',   fn:()=>Pages.dirSettings()},
  };

  const route=routes[page];
  if(!route){console.warn('Unknown page:',page);return;}

  const section=document.getElementById(route.id);
  if(section){
    section.classList.add('active');
    try{route.fn();}catch(e){
      console.error('Page render error:',page,e);
      section.innerHTML=`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:24px;margin:20px"><strong style="color:#dc2626">⚠ Page Error: ${page}</strong><pre style="color:#991b1b;font-size:.75rem;margin-top:8px;white-space:pre-wrap">${e.message}\n${e.stack||''}</pre></div>`;
    }
  } else { console.warn('No page element found for route id:',route.id); }

  // Close mobile sidebar if open
  document.getElementById('sidebar')?.classList.remove('open');
  const _ov=document.getElementById('sidebar-overlay'); if(_ov) _ov.style.display='none';

  // Scroll to top
  window.scrollTo(0,0);
}

// ── App Bootstrap ──
const App = {
  _defaultPage(role){
    return 'dashboard';
  },
  logout(){
    Auth.logout();
    _stTakeUnlocked=false; // reset stock take PIN on logout
    // Show login, hide app
    document.querySelectorAll('.view').forEach(v=>{v.classList.remove('active');v.style.display='';});
    const vl=document.getElementById('view-login'); if(vl){vl.classList.add('active');}
    document.getElementById('login-username').value='';
    document.getElementById('login-password').value='';
    document.getElementById('login-error').textContent='';
  },
  launch(){
    // Ensure schema up to date
    DB.load();
    Auth.restore();
    const u=Auth.user();
    if(u){
      this._showApp(u);
    } else {
      // view-login already has .active class in HTML, view-app does not
    }
    // Login form
    document.getElementById('login-form')?.addEventListener('submit',e=>{
      e.preventDefault();
      const username=document.getElementById('login-username').value.trim();
      const password=document.getElementById('login-password').value;
      if(Auth.login(username,password)){
        this._showApp(Auth.user());
      } else {
        document.getElementById('login-error').textContent='Invalid username or password.';
      }
    });
    // Mobile hamburger
    document.getElementById('mob-menu-btn')?.addEventListener('click',()=>{
      const open=document.getElementById('sidebar').classList.toggle('open');
      const ov=document.getElementById('sidebar-overlay');if(ov)ov.style.display=open?'block':'none';
    });
    // Sidebar overlay close
    // sidebar-overlay uses inline onclick
    // PIN keypad - wire up data-val buttons
    document.querySelectorAll('.pin-key[data-val]').forEach(btn=>{
      btn.addEventListener('click',()=>PIN.press(btn.dataset.val));
    });
    // Start PIN idle timer
    PIN.reset();
  },
  _showApp(u){
    // Show app view, hide login
    document.querySelectorAll('.view').forEach(v=>{v.classList.remove('active');v.style.display='';});
    const va=document.getElementById('view-app'); if(va) va.classList.add('active');
    buildSidebar();
    // Show install banner after login if prompt is available
    const _banner = document.getElementById('pwa-install-banner');
    if (_banner && _deferredInstall) _banner.style.display = 'flex';
    navigateTo(this._defaultPage(u.role));
    PIN.reset();
  }
};

document.addEventListener('DOMContentLoaded',()=>{
  App.launch();
  setTimeout(()=>Sync.init(), 200);
});
</script>

     DEVICE TRACKING — logs every login, flags new devices for directors
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
// ── Device Fingerprint ────────────────────────────────────────────────────────
const DeviceID = {
  _key: 'bob_device_id_v4',
  get() {
    let id = localStorage.getItem(this._key);
    if (!id) {
      id = 'DEV_' + Math.random().toString(36).slice(2,10).toUpperCase() + '_' + Date.now().toString(36).toUpperCase();
      localStorage.setItem(this._key, id);
    }
    return id;
  },
  fingerprint() {
    const ua = navigator.userAgent;
    const sc = `${screen.width}x${screen.height}`;
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const lang = navigator.language;
    const plat = navigator.platform || 'unknown';
    return btoa(`${sc}|${tz}|${lang}|${plat}`).slice(0,20);
  },
  label() {
    const ua = navigator.userAgent;
    if (/iPhone/i.test(ua)) return 'iPhone';
    if (/iPad/i.test(ua)) return 'iPad';
    if (/Android.*Mobile/i.test(ua)) return 'Android Phone';
    if (/Android/i.test(ua)) return 'Android Tablet';
    if (/Mac/i.test(ua)) return 'Mac';
    if (/Windows/i.test(ua)) return 'Windows PC';
    if (/Linux/i.test(ua)) return 'Linux';
    return 'Device';
  }
};

// ── Login Audit ───────────────────────────────────────────────────────────────
const LoginAudit = {
  _key: 'bob_login_audit_v4',
  _knownKey: 'bob_known_devices_v4',

  getLog() {
    try { return JSON.parse(localStorage.getItem(this._key) || '[]'); } catch { return []; }
  },
  getKnown() {
    try { return JSON.parse(localStorage.getItem(this._knownKey) || '{}'); } catch { return {}; }
  },

  record(username) {
    const fp   = DeviceID.fingerprint();
    const devId = DeviceID.get();
    const known = this.getKnown();
    const userKey = `${username}::${fp}`;
    const isNew  = !known[userKey];

    const entry = {
      ts:       new Date().toISOString(),
      username,
      deviceId: devId,
      deviceLabel: DeviceID.label(),
      fingerprint: fp,
      isNew,
      ua: navigator.userAgent.slice(0, 120)
    };

    // Save event
    const log = this.getLog();
    log.unshift(entry);
    if (log.length > 500) log.splice(500);
    localStorage.setItem(this._key, JSON.stringify(log));

    // Mark device as known
    if (isNew) {
      known[userKey] = { first: entry.ts, deviceId: devId };
      localStorage.setItem(this._knownKey, JSON.stringify(known));
    }

    return entry;
  },

  // Show in-app banner if a new device for a managed user
  checkAndAlert(entry) {
    if (!entry.isNew) return;
    // Show a subtle toast for all roles — directors see it in audit log too
    if (typeof UI !== 'undefined') {
      setTimeout(() => {
        UI.toast(`Logged in from a new ${entry.deviceLabel}`, 'info');
      }, 1500);
    }
  }
};

// ── Patch Auth.login to record audit entry ────────────────────────────────────
const _origLogin = Auth.login.bind(Auth);
Auth.login = function(username, password) {
  const ok = _origLogin(username, password);
  if (ok) {
    const entry = LoginAudit.record(username);
    LoginAudit.checkAndAlert(entry);
  }
  return ok;
};

// ── Login Audit Log Page (for directors) ──────────────────────────────────────
// Appended to Pages object
Pages.loginAudit = function() {
  const el = document.getElementById('page-login-audit');
  if (!el) return;
  const log    = LoginAudit.getLog();
  const isDir  = Auth.is('director');

  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">Login Audit</div>
      <div class="page-sub">${log.length} login event${log.length !== 1 ? 's' : ''} recorded</div>
    </div>
    <div class="card card-body" style="margin-bottom:16px;background:#f0fdf4;border:1px solid #bbf7d0">
      <div style="font-size:.8rem;color:#166534">
        <strong>🔒 Device Tracking Active</strong> — every login is recorded with device type, timestamp and a unique device fingerprint.
        New device logins are flagged with 🆕.
      </div>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.82rem">
        <thead>
          <tr style="background:#231F20;color:white">
            <th style="padding:10px 12px;text-align:left">Time</th>
            <th style="padding:10px 12px;text-align:left">User</th>
            <th style="padding:10px 12px;text-align:left">Device</th>
            <th style="padding:10px 12px;text-align:left">Device ID</th>
            <th style="padding:10px 12px;text-align:center">New Device?</th>
          </tr>
        </thead>
        <tbody>
          ${log.length === 0 ? '<tr><td colspan="5" style="padding:24px;text-align:center;color:#9ca3af">No logins recorded yet</td></tr>' :
            log.map((e, i) => `
              <tr style="background:${i % 2 === 0 ? '#fff' : '#f9fafb'};border-bottom:1px solid #e5e7eb">
                <td style="padding:9px 12px;white-space:nowrap">${new Date(e.ts).toLocaleString('en-AU', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
                <td style="padding:9px 12px;font-weight:600">${e.username}</td>
                <td style="padding:9px 12px">${e.deviceLabel || '—'}</td>
                <td style="padding:9px 12px;font-family:monospace;font-size:.75rem;color:#6b7280">${(e.deviceId||'').slice(0,16)}…</td>
                <td style="padding:9px 12px;text-align:center">${e.isNew ? '<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:700">🆕 New</span>' : '<span style="color:#10b981;font-size:.85rem">✓</span>'}</td>
              </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
};
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     PWA: Service Worker registration + Install prompt
     ═══════════════════════════════════════════════════════════════════════ -->
<div id="pwa-install-banner" style="display:none;position:fixed;bottom:80px;left:16px;right:16px;z-index:8888;background:#231F20;color:white;border-radius:16px;padding:14px 18px;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none;align-items:center;gap:12px;max-width:420px;margin:0 auto">
  <img src="icons/icon-192.png" style="width:40px;height:40px;border-radius:10px;flex-shrink:0">
  <div style="flex:1;min-width:0">
    <div style="font-weight:700;font-size:.9rem">Install BOB Stock</div>
    <div style="font-size:.75rem;color:rgba(255,255,255,.7);margin-top:2px">Add to home screen for quick access</div>
  </div>
  <button id="pwa-install-btn" style="background:#D8838B;color:white;border:none;padding:8px 16px;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap">Install</button>
  <button onclick="document.getElementById('pwa-install-banner').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:1.2rem;padding:0 4px;line-height:1" aria-label="Dismiss install prompt">✕</button>
</div>

<div id="offline-bar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9998;background:#ef4444;color:white;text-align:center;padding:6px;font-size:.78rem;font-weight:600">
  ⚡ You are offline — data will sync when reconnected
</div>

<script>
// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[BOB] SW registered:', reg.scope))
      .catch(err => console.warn('[BOB] SW registration failed:', err));
  });
}

// ── Offline indicator ─────────────────────────────────────────────────────────
function updateOnlineStatus() {
  const bar = document.getElementById('offline-bar');
  if (bar) bar.style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ── PWA install prompt ────────────────────────────────────────────────────────
let _deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstall = e;
  const banner = document.getElementById('pwa-install-banner');
  if (banner && Auth.user()) banner.style.display = 'flex';
});

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('pwa-install-btn');
  if (btn) {
    btn.addEventListener('click', async () => {
      if (!_deferredInstall) return;
      _deferredInstall.prompt();
      const { outcome } = await _deferredInstall.userChoice;
      _deferredInstall = null;
      document.getElementById('pwa-install-banner').style.display = 'none';
    });
  }
});

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install-banner').style.display = 'none';
  _deferredInstall = null;
  if (typeof UI !== 'undefined') UI.toast('App installed! 🎉 Find it on your home screen.', 'success');
});
</script>
