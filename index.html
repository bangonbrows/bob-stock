  <style>
:root {
  --rose: #d8838b;
  --black: #231F20;
  --rose-light: #fdf0f1;
  --rose-mid: #edb8bc;
  --bg: #f7f7f7;
  --sidebar-w: 240px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--black); font-size: 14px; }
.bob-logo { text-align: center; line-height: 1.1; }
.logo-bang, .logo-brows { font-family: 'Playfair Display', serif; font-weight: 700; letter-spacing: .18em; color: var(--black); }
.logo-on { font-family: 'Dancing Script', cursive; color: var(--rose); font-weight: 600; }
.logo-line { display: flex; align-items: center; justify-content: center; gap: 8px; }
.logo-dash { flex: 1; height: 1px; background: var(--rose); max-width: 28px; }
.view { display: none; min-height: 100vh; }
.view.active { display: flex; }
#view-login { align-items: center; justify-content: center; background: linear-gradient(135deg, #fff 60%, var(--rose-light) 100%); }
.login-card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(35,31,32,.10); }
#view-app { flex-direction: row; }
#view-app.active { display: flex; }
.sidebar { width: var(--sidebar-w); background: #111111; color: white; height: 100vh; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-nav { flex: 1; overflow-y: auto; }
  .sidebar-footer { flex-shrink: 0; }
.sidebar-logo { padding: 28px 20px 20px; border-bottom: 1px solid rgba(255,255,255,.08); }
.sidebar-logo .logo-bang, .sidebar-logo .logo-brows { color: white; font-size: 1.1rem; }
.sidebar-logo .logo-on { font-size: 1rem; }
.sidebar-logo .logo-dash { background: var(--rose); }
.sidebar-section { padding: 16px 8px 4px; font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.35); padding-left: 20px; }
.nav-section { padding: 0; }
.nav-section-title { padding: 12px 20px 4px; font-size: .62rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.35); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; border-radius: 8px; margin: 1px 8px; transition: background .15s; color: rgba(255,255,255,.7); font-size: .825rem; font-weight: 500; }
.nav-item:hover { background: rgba(216,131,139,.18); color: white; }
.nav-item.active { background: var(--rose); color: white; }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-badge { background: #ef4444; color: white; border-radius: 10px; padding: 1px 6px; font-size: .65rem; font-weight: 700; margin-left: auto; }
.sidebar-footer-btn { display:flex; align-items:center; gap:8px; width:100%; padding:9px 12px; border-radius:8px; border:none; background:transparent; color:rgba(255,255,255,.6); font-size:.8rem; font-weight:500; cursor:pointer; transition:background .15s; }
.sidebar-footer-btn:hover { background:rgba(255,255,255,.08); color:#fff; }
.sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,.08); }
.sidebar-user { font-size: .75rem; color: rgba(255,255,255,.5); margin-bottom: 8px; }
.sidebar-user strong { display: block; color: rgba(255,255,255,.85); font-size: .825rem; margin-bottom: 2px; }
.main-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow-y: auto; }
.mobile-topbar { display: none; background: white; border-bottom: 1px solid #eee; padding: 12px 16px; align-items: center; justify-content: space-between; }
.page { display: none; padding: 28px; flex: 1; }
.page.active { display: block; }
.page-header { margin-bottom: 24px; }
.page-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
.page-sub { color: #6b7280; font-size: .825rem; }
.card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.card-body { padding: 20px; }
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.stat-val { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 700; }
.stat-lbl { font-size: .75rem; color: #6b7280; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.btn { padding: 9px 20px; border-radius: 8px; font-size: .825rem; font-weight: 600; cursor: pointer; border: none; transition: all .15s; font-family: 'Inter', sans-serif; }
.btn-primary { background: var(--rose); color: white; }
.btn-primary:hover { background: #c4717a; }
.btn-secondary { background: white; color: var(--black); border: 1.5px solid #e5e7eb; }
.btn-secondary:hover { background: #f9f9f9; border-color: var(--rose); }
.btn-ghost { background: transparent; color: var(--rose); border: 1.5px solid var(--rose); }
.btn-ghost:hover { background: var(--rose-light); }
.btn-danger { background: #fee2e2; color: #dc2626; border: none; }
.btn-danger:hover { background: #fecaca; }
.btn-sm { padding: 6px 14px; font-size: .75rem; }
.btn-lg { padding: 14px 36px; font-size: 1rem; }
.inout-btn { padding: 28px 56px; border-radius: 16px; font-size: 1.5rem; font-weight: 800; cursor: pointer; border: 3px solid transparent; transition: all .2s; letter-spacing: .05em; }
.btn-in { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
.btn-in:hover, .btn-in.sel { background: #16a34a; color: white; border-color: #16a34a; }
.btn-out { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
.btn-out:hover, .btn-out.sel { background: #dc2626; color: white; border-color: #dc2626; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: .7rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #6b7280; margin-bottom: 6px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: .875rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; background: white; color: var(--black); }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--rose); }
.form-textarea { resize: vertical; min-height: 72px; }
.step-indicator { display: flex; gap: 8px; align-items: center; margin-bottom: 24px; }
.step { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; background: #f3f4f6; color: #9ca3af; }
.step.done { background: #d1fae5; color: #059669; }
.step.active { background: var(--rose); color: white; }
.step-line { flex: 1; height: 1px; background: #e5e7eb; max-width: 32px; }
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; background: linear-gradient(to right,white 30%,rgba(255,255,255,0)) left, linear-gradient(to left,white 30%,rgba(255,255,255,0)) right, radial-gradient(farthest-side at 0 50%,rgba(0,0,0,.08),transparent) left, radial-gradient(farthest-side at 100% 50%,rgba(0,0,0,.08),transparent) right; background-repeat:no-repeat; background-color:white; background-size:40px 100%,40px 100%,14px 100%,14px 100%; background-attachment:local,local,scroll,scroll; }
table { width: 100%; border-collapse: collapse; background: white; }
thead th { background: #f9fafb; padding: 11px 14px; text-align: left; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
tbody td { padding: 10px 14px; border-bottom: 1px solid #f3f4f6; font-size: .825rem; }
tbody tr:hover td { background: #fafafa; }
tbody tr:last-child td { border-bottom: none; }
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 600; }
.badge-red    { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.badge-green  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.badge-amber  { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
.badge-blue   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
.badge-gray   { background: #f9fafb; color: #6b7280; border: 1px solid #e5e7eb; }
.badge-rose   { background: var(--rose-light); color: var(--rose); border: 1px solid var(--rose-mid); }
.badge-purple { background: #f5f3ff; color: #7c3aed; border: 1px solid #c4b5fd; }
.badge-teal   { background: #f0fdfa; color: #0d9488; border: 1px solid #99f6e4; }
.alert-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 10px; border-left: 4px solid; margin-bottom: 8px; background: white; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.alert-critical { border-color: #dc2626; }
.alert-warning  { border-color: #d97706; }
.alert-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
.alert-critical .alert-icon { background: #fef2f2; }
.alert-warning  .alert-icon { background: #fffbeb; }
.alert-info  { flex: 1; }
.alert-name  { font-weight: 600; font-size: .825rem; }
.alert-detail { font-size: .75rem; color: #6b7280; margin-top: 2px; }
.tab-bar { display: flex; gap: 4px; border-bottom: 1px solid #e5e7eb; margin-bottom: 24px; overflow-x: auto; }
.tab-btn { padding: 10px 16px; font-size: .825rem; font-weight: 500; cursor: pointer; background: none; border: none; color: #6b7280; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all .15s; font-family: 'Inter', sans-serif; }
.tab-btn:hover { color: var(--rose); }
.tab-btn.active { color: var(--rose); border-bottom-color: var(--rose); font-weight: 600; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #e5e7eb; background: white; cursor: pointer; font-size: .75rem; font-weight: 500; transition: all .15s; }
.filter-chip:hover { border-color: var(--rose); color: var(--rose); }
.filter-chip.active { background: var(--rose); color: white; border-color: var(--rose); }
#pin-overlay { position: fixed; inset: 0; background: rgba(35,31,32,.96); z-index: 9999; display: none; align-items: center; justify-content: center; }
#pin-overlay.show { display: flex; }
.pin-card { background: white; border-radius: 24px; padding: 40px; text-align: center; max-width: 340px; width: 90%; }
.pin-dots { display: flex; gap: 14px; justify-content: center; margin: 20px 0; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #e5e7eb; transition: background .15s; }
.pin-dot.filled { background: var(--rose); }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
.pin-key { padding: 16px; border-radius: 12px; border: 1.5px solid #e5e7eb; background: white; font-size: 1.25rem; font-family: 'Playfair Display', serif; font-weight: 600; cursor: pointer; transition: all .15s; }
.pin-key:hover { background: var(--rose-light); border-color: var(--rose); }
.pin-error { color: #dc2626; font-size: .8rem; margin-top: 8px; min-height: 20px; }
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { padding: 12px 18px; border-radius: 10px; color: white; font-size: .825rem; font-weight: 500; box-shadow: 0 4px 14px rgba(0,0,0,.15); max-width: 300px; animation: toastIn .3s ease; pointer-events: auto; }
.toast-success { background: #059669; }
.toast-error   { background: #dc2626; }
.toast-info    { background: var(--rose); }
@keyframes toastIn { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 16px; }
#modal-overlay.show { display: flex; }
#modal-box { background: white; border-radius: 16px; padding: 32px; max-width: 540px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; }
.modal-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: #f3f4f6; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid #f3f4f6; }
.divider { border: none; border-top: 1px solid #f3f4f6; margin: 20px 0; }
.text-rose  { color: var(--rose); }
.text-muted { color: #9ca3af; }
.text-red   { color: #dc2626; }
.text-green { color: #16a34a; }
.text-amber { color: #d97706; }
.fw-bold    { font-weight: 700; }
.font-serif { font-family: 'Playfair Display', serif; }
.empty-state { text-align: center; padding: 48px 24px; color: #9ca3af; }
.empty-state svg { width: 48px; height: 48px; margin: 0 auto 12px; opacity: .4; }
.search-input { position: relative; }
.search-input input { padding-left: 36px; }
.search-input svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9ca3af; width: 16px; height: 16px; }
.product-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; max-height: 320px; overflow-y: auto; }
.product-card-sel { padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: all .15s; }
.product-card-sel:hover { border-color: var(--rose); background: var(--rose-light); }
.product-card-sel.selected { border-color: var(--rose); background: var(--rose-light); }
.product-card-sel .pname { font-weight: 600; font-size: .8rem; }
.product-card-sel .pref  { font-size: .7rem; color: #9ca3af; }
.progress-bar  { height: 6px; border-radius: 3px; background: #e5e7eb; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.progress-fill.ok   { background: #16a34a; }
.progress-fill.warn { background: #d97706; }
.progress-fill.low  { background: #dc2626; }
.cost-field { background: #fffbeb; border: 1.5px solid #fde68a; }
.director-badge { display: inline-flex; align-items: center; gap: 6px; background: #231F20; color: #d8838b; padding: 4px 12px; border-radius: 20px; font-size: .7rem; font-weight: 700; letter-spacing: .05em; }
.franchise-badge { display: inline-flex; align-items: center; gap: 4px; background: #f5f3ff; color: #7c3aed; padding: 3px 10px; border-radius: 20px; font-size: .65rem; font-weight: 700; border: 1px solid #c4b5fd; }
.warehouse-tag { display: inline-flex; align-items: center; background: #f0f9ff; color: #0369a1; padding: 3px 10px; border-radius: 20px; font-size: .65rem; font-weight: 700; border: 1px solid #bae6fd; }
.cost-history-item { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
@media (max-width: 900px) {
  #sidebar { position: fixed; left: -100%; top: 0; height: 100vh; z-index: 200; transition: left .25s; }
  #sidebar.open { left: 0; display: flex; }
  .mobile-topbar { display: flex !important; }

  .sidebar { display: none; }
  .mobile-topbar { display: flex; }
  .page { padding: 16px; }
  .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); }
  .grid-2 { grid-template-columns: 1fr; }
  .inout-btn { padding: 20px 36px; font-size: 1.2rem; }
  .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; z-index: 100; display: flex; padding: 4px 0; }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px; font-size: .6rem; cursor: pointer; color: #9ca3af; gap: 3px; }
  .mobile-nav-item.active { color: var(--rose); }
  .mobile-nav-item svg { width: 20px; height: 20px; }
  .main-wrap { padding-bottom: 70px; }
}
@media (min-width: 901px) { .mobile-nav { display: none; } }

/* iOS zoom: inputs ≥16px prevents Safari auto-zoom on focus */
@media (max-width: 900px) {
  .form-input, .form-select, .form-textarea, input, select, textarea { font-size: 16px !important; }
}

/* ── Additional mobile fixes ─────────────────────────────────────────────── */
/* Stats grid was missing from the 768px breakpoint */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  #modal-box { padding: 24px; max-height: 90vh; }
  #modal-overlay { padding: 12px; }
  .modal-footer { flex-wrap: wrap; gap: 8px; }
  .modal-footer .btn { flex: 1; min-width: 120px; }
  #toast-container { bottom: 80px; right: 12px; left: auto; max-width: calc(100vw - 24px); }
  .tab-bar { gap: 2px; }
  .tab-btn { padding: 8px 12px; font-size: .75rem; }
}
/* Small phones <= 480px */
@media (max-width: 480px) {
  .page { padding: 12px; }
  .page-title { font-size: 1.2rem; }
  .page-sub { font-size: .775rem; }
  .stat-card { padding: 12px 14px; }
  .stat-val { font-size: 1.3rem; }
  .stat-lbl { font-size: .65rem; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .grid-2 { grid-template-columns: 1fr; }
  .card-body { padding: 14px; }
  .inout-btn { min-width: 0 !important; width: 100% !important; padding: 14px 16px !important; font-size: 1rem !important; box-sizing: border-box; }
  #modal-box { padding: 16px; border-radius: 12px; }
  .modal-footer { flex-direction: column; }
  .modal-footer .btn { width: 100%; text-align: center; min-width: unset; }
  .page-header { margin-bottom: 16px; }
  [style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
  [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
  .step-indicator { margin-bottom: 16px; }
}
  </style>
</head>

<div id="pin-overlay">
  <div class="pin-card">
    <div style="font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9ca3af;margin-bottom:8px">Session Locked</div>
    <div style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#231F20">Enter PIN</div>
    <div style="font-size:.8rem;color:#9ca3af;margin-top:4px">10 minutes of inactivity</div>
    <div class="pin-dots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="pin-keypad">
      <button class="pin-key" data-val="1">1</button><button class="pin-key" data-val="2">2</button><button class="pin-key" data-val="3">3</button>
      <button class="pin-key" data-val="4">4</button><button class="pin-key" data-val="5">5</button><button class="pin-key" data-val="6">6</button>
      <button class="pin-key" data-val="7">7</button><button class="pin-key" data-val="8">8</button><button class="pin-key" data-val="9">9</button>
      <button class="pin-key" data-val="del" style="font-size:.8rem">⌫</button><button class="pin-key" data-val="0">0</button><button class="pin-key" data-val="del" style="font-size:.8rem">CLR</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div style="margin-top:14px;font-size:.72rem;color:#d1d5db">Enter your assigned PIN</div>
  </div>
</div>

<div id="toast-container"></div>

<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="UI.closeModal()" aria-label="Close dialog">✕</button>

    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  BANG ON BROWS v2 — App Core
// ══════════════════════════════════════════════════


// ── GitHub Sync ──────────────────────────────────────────────────────────────
const Sync = {
  REPO:  'bangonbrows/bob-stock',
  FILE:  'data/bob-stock-data.json',
  // Token split to avoid secret-scanner false positives in repo
  TOKEN: ['github_pat_','11CARCLKI063eF','DsFbhKAu_JMNYi53OdsKvTy6s4SAtul4YUdymifTCWZLPFUmgSbpYYHVHXEIc71D5MGc'].join(''),
  _sha: null, _syncing: false, _pendingSync: false, _retryCount: 0,
  _debounceTimer: null, _pollInterval: null, _statusEl: null, _hideTimer: null,

  get _url(){ return `https://api.github.com/repos/${this.REPO}/contents/${this.FILE}`; },

  _hdrs(){
    return { 'Authorization':`Bearer ${this.TOKEN}`,
             'Accept':'application/vnd.github+json',
             'X-GitHub-Api-Version':'2022-11-28' };
  },

  _showStatus(msg, autoHide){
    if(!this._statusEl){
      this._statusEl = document.createElement('div');
      this._statusEl.style.cssText =
        'position:fixed;bottom:72px;right:14px;z-index:99999;'+
        'background:rgba(20,20,20,0.88);color:#fff;padding:5px 14px;'+
        'border-radius:20px;font-size:11px;pointer-events:none;'+
        'transition:opacity 0.4s;box-shadow:0 2px 8px rgba(0,0,0,0.4);';
      document.body.appendChild(this._statusEl);
    }
    clearTimeout(this._hideTimer);
    this._statusEl.style.opacity='1';
    this._statusEl.style.display='block';
    this._statusEl.textContent = msg;
    if(autoHide){
      this._hideTimer = setTimeout(()=>{
        this._statusEl.style.opacity='0';
        setTimeout(()=>{ if(this._statusEl)this._statusEl.style.display='none'; },500);
      }, 2500);
    }
  },

  async pull(){
    try{
      const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),15000);
      const res = await fetch(this._url, {headers:this._hdrs(),signal:ac.signal});clearTimeout(tid);
      if(res.status===404) return null;
      if(!res.ok) throw new Error(res.status);
      const j = await res.json();
      this._sha = j.sha;
      return JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\s/g,'')))));
    }catch(e){ console.warn('[Sync] pull failed:',e.message); return null; }
  },

  async push(data){
    if(this._syncing){ this._pendingSync=true; return; }
    this._syncing=true;
    this._showStatus('☁ Syncing…');
    try{
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      const body = {message:`sync ${new Date().toISOString()}`,content,
                    ...(this._sha?{sha:this._sha}:{})};
      const ac2=new AbortController();const tid2=setTimeout(()=>ac2.abort(),15000);
      const res = await fetch(`https://api.github.com/repos/${this.REPO}/contents/${this.FILE}`,{
        method:'PUT',
        headers:{...this._hdrs(),'Content-Type':'application/json'},
        body:JSON.stringify(body),
        signal:ac2.signal
      });clearTimeout(tid2);
      if(res.status===409){
        // SHA conflict – re-read, merge, retry (max 3 times)
        this._syncing=false;
        this._retryCount=(this._retryCount||0)+1;
        if(this._retryCount>3){
          this._retryCount=0;
          localStorage.setItem('bob_sync_pending','1');
          this._showStatus('⚠ Sync conflict — will retry on next save');
          return;
        }
        const remote=await this.pull();
        if(remote) return this.push(this._merge(remote,data));
        return;
      }
      if(!res.ok) throw new Error(res.status);
      const r=await res.json();
      this._sha=r.content.sha;
      this._retryCount=0;
      localStorage.removeItem('bob_sync_pending');
      this._showStatus('✓ Synced', true);
    }catch(e){
      console.warn('[Sync] push failed:',e.message);
      localStorage.setItem('bob_sync_pending','1');
      this._showStatus('○ Offline – will sync when back online');
    }
    this._syncing=false;
    if(this._pendingSync){ this._pendingSync=false; this.push(DB.get()); }
  },

  _merge(remote, local){
    const txById={};
    (remote.transactions||[]).forEach(t=>{txById[t.id]=t;});
    (local.transactions||[]).forEach(t=>{txById[t.id]=t;});
    const delById={};
    (remote.deletedTransactions||[]).forEach(t=>{delById[t.id]=t;});
    (local.deletedTransactions||[]).forEach(t=>{delById[t.id]=t;});
    const deliv={};
    (remote.deliveries||[]).forEach(d=>{deliv[d.id]=d;});
    (local.deliveries||[]).forEach(d=>{deliv[d.id]=d;});
    const deletedIds=new Set(Object.keys(delById));
    return {...remote,...local,
      transactions:Object.values(txById).filter(t=>!deletedIds.has(t.id)),
      deletedTransactions:Object.values(delById),
      deliveries:Object.values(deliv)};
  },

  _rerender(){
    try{
      if(document.getElementById('modal-overlay')?.classList.contains('show')) return;
      const page=document.querySelector('[data-page].active')?.dataset?.page||'dashboard';
      if(page==='log-movement') return;
      if(typeof navigateTo==='function') navigateTo(page);
    }catch(e){}
  },

  async poll(){
    if(!navigator.onLine) return;
    const remote=await this.pull();
    if(!remote) return;
    const local=DB.get();
    const rSig=JSON.stringify([
      (remote.transactions||[]).map(t=>t.id).sort(),
      (remote.deletedTransactions||[]).map(t=>t.id).sort(),
      (remote.deliveries||[]).map(d=>d.id).sort()
    ]);
    const lSig=JSON.stringify([
      (local.transactions||[]).map(t=>t.id).sort(),
      (local.deletedTransactions||[]).map(t=>t.id).sort(),
      (local.deliveries||[]).map(d=>d.id).sort()
    ]);
    if(rSig!==lSig){
      const merged=this._merge(remote,local);
      DB._cache=merged; DB.save(merged);
      this._rerender();
    }
  },

  scheduleSync(){
    clearTimeout(this._debounceTimer);
    this._debounceTimer=setTimeout(()=>{
      if(navigator.onLine) this.push(DB.get());
      else localStorage.setItem('bob_sync_pending','1');
    }, 800);
  },

  async init(){
    this._showStatus('☁ Loading live data…');
    const remote=await this.pull();
    if(remote){
      const local=DB.get();
      const merged=this._merge(remote,local);
      DB._cache=merged; DB.save(merged);
      this._rerender();
      this._showStatus('✓ Live data loaded', true);
    } else {
      await this.push(DB.get());
    }
    if(localStorage.getItem('bob_sync_pending')) this.push(DB.get());
    this._pollInterval=setInterval(()=>this.poll(), 30000);
    window.addEventListener('online',()=>{
      this._showStatus('☁ Back online – syncing…');
      if(localStorage.getItem('bob_sync_pending')) this.push(DB.get());
    });
    window.addEventListener('offline',()=>this._showStatus('○ Offline – changes saved locally'));
  }
};

// ── DB Layer ─────────────────────────────────────
const DB = {
  KEY: 'bob_stock_v4',
  load() {
    const raw = localStorage.getItem(this.KEY);
    if (raw) return JSON.parse(raw);
    const d = {
      productTypes: JSON.parse(JSON.stringify(SEED.productTypes)),
      categories:   JSON.parse(JSON.stringify(SEED.categories)),
      products:     SEED.products.map(p=>({...p, active:true, freight:null, customs:null, tax:null, supplierName:'', supplierContact:'', leadDays:null})),
      stores:       JSON.parse(JSON.stringify(SEED.stores)),
      users:        JSON.parse(JSON.stringify(SEED.users)),
      thresholds:   JSON.parse(JSON.stringify(SEED.thresholds)),
      transactions: JSON.parse(JSON.stringify(SEED.transactions)),
      costHistory:  JSON.parse(JSON.stringify(SEED.costHistory)),
      stockTakes:   [],
      stockTakePin: { pin: null, expiresAt: null }
    };
    this.save(d); return d;
  },
  save(d) {
    try{
      localStorage.setItem(this.KEY, JSON.stringify(d));
    }catch(e){
      if(e.name==='QuotaExceededError'||e.code===22){
        let banner=document.getElementById('storage-full-banner');
        if(!banner){
          banner=document.createElement('div');
          banner.id='storage-full-banner';
          banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#dc2626;color:white;text-align:center;padding:10px 16px;font-weight:600;font-size:.875rem';
          banner.innerHTML='⚠ Storage Full — App data cannot be saved. Please export a backup and clear old data.';
          document.body.prepend(banner);
        }
        console.error('[DB] QuotaExceededError — localStorage full');
      }
    }
  },
  get()   {
    if(!this._cache){ this._cache=this.load(); this._migrate(); }
    return this._cache;
  },
  _migrate(){
    let changed=false;
    if(!this._cache.stockTakePin){this._cache.stockTakePin={pin:null,expiresAt:null};changed=true;}
    if(!this._cache.deliveries){this._cache.deliveries=[];changed=true;}
    if(!this._cache.deletedTransactions){this._cache.deletedTransactions=[];changed=true;}
    if(!this._cache.deletedTransactions){this._cache.deletedTransactions=[];changed=true;}
    // Rename franchiseMarkup → franchiseDiscount on stores and products
    this._cache.stores.forEach(s=>{if(s.franchiseMarkup!==undefined&&s.franchiseDiscount===undefined){s.franchiseDiscount=s.franchiseMarkup;delete s.franchiseMarkup;changed=true;}});
    this._cache.products.forEach(p=>{if(p.franchiseMarkup!==undefined&&p.franchiseDiscount===undefined){p.franchiseDiscount=p.franchiseMarkup;delete p.franchiseMarkup;changed=true;}});
    // Add weightGrams to products if missing
    this._cache.products.forEach(p=>{if(p.weightGrams===undefined){p.weightGrams=null;changed=true;}});
    // Add internalUse to products if missing
    this._cache.products.forEach(p=>{if(p.internalUse===undefined){p.internalUse=false;changed=true;}});
    // Add cockburn_office franchise store if missing
    if(!this._cache.stores.find(s=>s.id==='cockburn_office')){
      this._cache.stores.push({id:'cockburn_office',name:'Cockburn Franchise Office',type:'warehouse',active:true,isFranchise:true,isFranchiseOffice:true,franchiseDiscount:null});
      changed=true;
    }
    // Update fran_cockburn user to have cockburn_office in storeIds
    const franUser=this._cache.users.find(u=>u.username==='fran_cockburn');
    if(franUser&&!franUser.storeIds.includes('cockburn_office')){
      franUser.storeIds.unshift('cockburn_office'); changed=true;
    }
    if(changed)this.commit();
  },
  commit(){ this.save(this._cache); if(typeof Sync!=='undefined') Sync.scheduleSync(); },
  reset() { localStorage.removeItem(this.KEY); this._cache = null; location.reload(); }
};

// ── Auth ─────────────────────────────────────────
const Auth = {
  _user: null,
  login(username, password) {
    const u = DB.get().users.find(u=>u.username===username && u.password===password);
    if (!u) return false;
    this._user = u;
    sessionStorage.setItem('bob_session_v4', JSON.stringify(u));
    return true;
  },
  restore() {
    const s = sessionStorage.getItem('bob_session_v4');
    if (s) this._user = JSON.parse(s);
  },
  logout() { this._user=null; sessionStorage.removeItem('bob_session_v4'); },
  user()    { return this._user; },
  is(role)  { return this._user && this._user.role === role; },
  isAtLeast(role) {
    const order = ['staff','franchisee','store_manager','territory_manager','head_office','director'];
    return order.indexOf(this._user?.role) >= order.indexOf(role);
  },
  storeId() { return this._user?.storeIds?.[0] || null; },
  storeIds(){ return this._user?.storeIds || []; },
  canSeeStore(storeId) {
    const r = this._user?.role;
    if (r==='head_office'||r==='director') return true;
    return (this._user?.storeIds||[]).includes(storeId);
  },
  isFranchisee() { return this._user?.role === 'franchisee'; },
  isHO()         { return this._user?.role === 'head_office' || this._user?.role === 'director'; },
  isMgmt()       { return ['territory_manager','head_office','director'].includes(this._user?.role); },
  isStoreLevel() { const r=this._user?.role; return r==='staff'||r==='store_manager'||r==='franchisee'; }
};

// ── Stock Calculations ───────────────────────────
const Stock = {
  qty(productId, storeId) {
    return DB.get().transactions
      .filter(t=>t.productId===productId && t.storeId===storeId)
      .reduce((s,t)=>(t.type==='in'||t.type==='return_in')?s+t.qty:s-t.qty, 0);
  },
  storeStock(storeId) {
    return DB.get().products.filter(p=>p.active).map(p=>({ product:p, qty:this.qty(p.id, storeId) }));
  },
  threshold(productId, storeId) {
    return DB.get().thresholds.find(t=>t.productId===productId && t.storeId===storeId) || null;
  },
  alerts(storeIds) {
    const d = DB.get();
    const results = [];
    const stores = storeIds ? d.stores.filter(s=>s.active && storeIds.includes(s.id)) : d.stores.filter(s=>s.active && (s.type!=='warehouse'||s.isFranchiseOffice));
    stores.forEach(store=>{
      d.products.filter(p=>p.active).forEach(product=>{
        const thr = this.threshold(product.id, store.id);
        if (!thr) return;
        const qty = this.qty(product.id, store.id);
        if (qty<=thr.minQty) results.push({store,product,qty,minQty:thr.minQty,leadDays:thr.leadDays,critical:qty===0});
      });
    });
    return results.sort((a,b)=>a.qty-b.qty);
  },
  totalValue(storeId) {
    const d = DB.get();
    let total = 0;
    d.stores.filter(s=>s.active&&(!storeId||s.id===storeId)).forEach(store=>{
      d.products.filter(p=>p.active&&p.price).forEach(product=>{
        total += this.qty(product.id,store.id)*product.price;
      });
    });
    return total;
  },
  monthlySummary(storeId, months) {
    const now = new Date(); const result = [];
    for (let i=months-1;i>=0;i--) {
      const d2 = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const label = d2.toLocaleString('default',{month:'short',year:'2-digit'});
      const txns = DB.get().transactions.filter(t=>{
        const td = new Date(t.date);
        return td.getMonth()===d2.getMonth() && td.getFullYear()===d2.getFullYear() && (!storeId||t.storeId===storeId);
      });
      result.push({ label, ins:txns.filter(t=>t.type==='in').reduce((s,t)=>s+t.qty,0), outs:txns.filter(t=>t.type==='out').reduce((s,t)=>s+t.qty,0) });
    }
    return result;
  },
  // Get cost price at a specific date (for variable cost pricing)
  costAtDate(productId, date) {
    const d = DB.get();
    const history = (d.costHistory||[]).filter(h=>h.productId===productId && h.date<=date);
    if (!history.length) return d.products.find(p=>p.id===productId)?.costPrice||null;
    history.sort((a,b)=>b.date.localeCompare(a.date));
    return history[0].costPrice;
  },
  // Current cost price (most recent)
  currentCost(productId) {
    const d = DB.get();
    const history = (d.costHistory||[]).filter(h=>h.productId===productId);
    if (!history.length) return d.products.find(p=>p.id===productId)?.costPrice||null;
    history.sort((a,b)=>b.date.localeCompare(a.date));
    return history[0].costPrice;
  }
};

  storeBadge(store) {

  }

// ── PIN / Timeout ────────────────────────────────
const PIN = {
  _timer:null, _entry:'', _timeout:600000,
  reset() { clearTimeout(this._timer); this._timer=setTimeout(()=>this.lock(),this._timeout); },
  lock()  { if(!Auth.user())return; document.getElementById('pin-overlay').classList.add('show'); this._entry=''; this.renderDots(); },
  renderDots() {
    document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<this._entry.length));
    document.getElementById('pin-error').textContent='';
  },
  press(v) {
    if(v==='del'){this._entry=this._entry.slice(0,-1);this.renderDots();return;}
    if(this._entry.length>=4)return;
    this._entry+=v; this.renderDots();
    if(this._entry.length===4)this.verify();
  },
  verify() {
    const user=Auth.user(); const fresh=DB.get().users.find(u=>u.id===user.id);
    if(this._entry===(fresh?.pin||'1234')){
      document.getElementById('pin-overlay').classList.remove('show'); this._entry=''; this.reset();
    } else {
      document.getElementById('pin-error').textContent='Incorrect PIN. Try again.';
      this._entry=''; setTimeout(()=>this.renderDots(),300);
    }
  }
};

// Idle activity tracking — reset PIN timer on user interaction
['click','keydown','touchstart','mousemove','scroll'].forEach(ev=>{
  window.addEventListener(ev,()=>{ if(Auth.user()&&!document.getElementById('pin-overlay')?.classList.contains('show')) PIN.reset(); },{passive:true});
});

// Reason options
const REASONS = {
  out: ['Used in Treatment','Sold Retail','Damaged/Expired','Used for Training','Returned to HO','Wastage','Opened New for Store Usage','Opened for Demo','Other'],
  in:  ['Supplier Delivery','Transfer from HO','Transfer from Store','Restock','In-Store Purchase','Other'],
  return_in: ['Change of Mind','Faulty/Damaged','Wrong Product','Overstocked','Other']
};
const FROM_OPTIONS = {
  in:        ['Supplier','HO Warehouse','Another Store','Franchise Office','Other'],
  return_in: ['Customer','Another Store','Franchise Store','Supplier'],
  out:       []
};
const TO_OPTIONS = {
  in:        [],
  return_in: [],
  out:       ['Same Store (In-House Use)','Customer Sale','Store Transfer','Franchise Transfer','Wastage/Damage','HO Warehouse','Other']
};
const REASONS_MAP = {
  out: {
    'Same Store (In-House Use)': ['Used in Treatment','Used for Training','Opened for Demo','Opened New for Store Usage','Wastage','Other'],
    'Customer Sale':              ['Sold Retail','Other'],
    'Store Transfer':             ['Transfer to Store','Other'],
    'Franchise Transfer':         ['Transfer to Franchise','Other'],
    'Wastage/Damage':             ['Damaged/Expired','Wastage','Other'],
    'HO Warehouse':               ['Returned to HO','Other'],
    'Other':                      ['Other'],
    '_default':                   ['Used in Treatment','Sold Retail','Damaged/Expired','Used for Training','Returned to HO','Wastage','Opened New for Store Usage','Opened for Demo','Other']
  },
  in: {
    'Supplier':         ['Supplier Delivery','Other'],
    'HO Warehouse':     ['Transfer from HO','Restock','Other'],
    'Another Store':    ['Transfer from Store','Other'],
    'Franchise Store':  ['Transfer from Franchise','Other'],
    'Franchise Office': ['Transfer from Franchise','Other'],
    'Other':            ['Other'],
    '_default':         ['Supplier Delivery','Transfer from HO','Transfer from Store','Restock','In-Store Purchase','Other']
  },
  return_in: {
    '_default': ['Change of Mind','Faulty/Damaged','Wrong Product','Overstocked','Other']
  }
};
const STORE_PICKER_FROM = ['Another Store','Franchise Store'];
const STORE_PICKER_TO   = ['Store Transfer','Franchise Transfer'];

// ── Pages ────────────────────────────────────────
const Pages = {

  // ── Log Movement ──
  logMovement() {
    const el = document.getElementById('page-log-movement');
    const isHO = Auth.isHO();
    const isFran = Auth.isFranchisee();
    const d = DB.get();
    const userStoreIds = Auth.storeIds();
    const hasMultiLoc = isHO || (isFran && userStoreIds.length > 1);
    const storeLabel = hasMultiLoc ? 'Select Location' : UI.storeName(Auth.storeId());
    // Build location options for HO or franchisee
    const buildLocOptions = () => {
      if(isHO){
        return `<option value="head_office">Head Office (Warehouse)</option>${d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice)).map(s=>`<option value="${s.id}">${s.name}${s.isFranchise?' 🔗':''}</option>`).join('')}`;
      } else if(isFran){
        return userStoreIds.map(sid=>{const s=d.stores.find(st=>st.id===sid);return s?`<option value="${s.id}">${s.name}${s.isFranchiseOffice?' (Franchise Office)':''}</option>`:''}).join('');
      }
      return '';
    };
    el.innerHTML = `
      <div class="page-header">
        <div class="page-title">Log Stock Movement</div>
        <div class="page-sub">${storeLabel} — ${new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
      ${hasMultiLoc ? `<div class="form-group" style="max-width:640px;margin-bottom:16px">
        <label class="form-label">Location</label>
        <select class="form-select" id="ho-store-sel" style="max-width:320px" onchange="Pages._onHOStoreChange()">
          ${buildLocOptions()}
        </select>
      </div>` : ''}
      <div class="card" style="max-width:640px">
        <div class="card-body">
          <div class="step-indicator" id="step-ind">
            <div class="step active" id="si1">1</div><div class="step-line"></div>
            <div class="step" id="si2">2</div><div class="step-line"></div>
            <div class="step" id="si3">3</div><div class="step-line"></div>
            <div class="step" id="si4">4</div>
          </div>
          <div id="step-content"></div>
        </div>
      </div>
      <div class="card" style="max-width:640px;margin-top:20px">
        <div class="card-body">
          <div style="font-weight:600;margin-bottom:12px;font-size:.875rem">Today's Movements</div>
          <div id="today-movements" class="tbl-wrap"></div>
        </div>
      </div>`;
    this._logStep = 1;
    this._logData = { selectedStoreId: isHO ? 'head_office' : (isFran&&userStoreIds.length>1?userStoreIds[0]:Auth.storeId()) };
    this._renderLogStep();
    this._renderTodayMovements();
  },

  _onHOStoreChange() {
    const sel = document.getElementById('ho-store-sel')?.value;
    this._logData.selectedStoreId = sel;
    this._renderTodayMovements();
  },

  _getLogStoreId() {
    return this._logData.selectedStoreId || Auth.storeId();
  },

  _renderLogStep() {
    const step = this._logStep;
    const el = document.getElementById('step-content');
    if(!el){ console.warn('step-content not found'); return; }
    for (let i=1;i<=4;i++) {
      const s=document.getElementById('si'+i); if(!s)continue;
      s.classList.remove('active','done');
      if(i<step)s.classList.add('done'); else if(i===step)s.classList.add('active');
    }
    if (step===1) {
      el.innerHTML=`<div style="margin-bottom:16px;font-weight:600">What are you doing?</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="inout-btn btn-in ${this._logData.type==='in'?'sel':''}" onclick="Pages._selectType('in')" style="min-width:140px">▲ STOCK IN</button>
          <button class="inout-btn btn-out ${this._logData.type==='out'?'sel':''}" onclick="Pages._selectType('out')" style="min-width:140px">▼ STOCK OUT</button>
          ${Auth.user()?.role!=='staff'?`<button class="inout-btn ${this._logData.type==='return_in'?'sel':''}" onclick="Pages._selectType('return_in')" style="min-width:140px;background:${this._logData.type==='return_in'?'#f59e0b':'#fffbeb'};border-color:#f59e0b;color:${this._logData.type==='return_in'?'white':'#b45309'}">↩ RETURN IN</button>`:''}
        </div>`;
    } else if (step===2) {
      const d=DB.get(); const types=d.productTypes;
      const cats=d.categories;
      el.innerHTML=`<div style="margin-bottom:8px;font-weight:600;font-size:.85rem">Product Type</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px" id="pt-chips">
          ${types.map(t=>`<span class="filter-chip ${this._logData.ptId===t.id?'active':''}" onclick="Pages._selectPT('${t.id}')">${t.name}</span>`).join('')}
        </div>
        <div style="margin-bottom:8px;font-weight:600;font-size:.85rem">Category</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px" id="cat-chips">
          <span class="filter-chip ${!this._logData.catId?'active':''}" onclick="Pages._selectCat(null)">All</span>
          ${(this._logData.ptId?cats.filter(c=>c.ptId===this._logData.ptId):cats).map(c=>`<span class="filter-chip ${this._logData.catId===c.id?'active':''}" onclick="Pages._selectCat('${c.id}')">${c.name}</span>`).join('')}
        </div>
        <div style="margin-bottom:10px;font-weight:600;font-size:.85rem">Search & Select Product</div>
        <div class="search-input" style="margin-bottom:12px">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input class="form-input" id="prod-search" placeholder="Search products..." oninput="Pages._filterProducts()" style="padding-left:36px">
        </div>
        <div class="product-select-grid" id="prod-grid"></div>
        <div style="margin-top:16px;display:flex;justify-content:flex-end">
          <button class="btn btn-secondary" style="margin-right:8px" onclick="Pages._logBack()">Back</button>
          <button class="btn btn-primary" id="step2-next" onclick="Pages._logNext()" ${!this._logData.productId?'disabled':''}>Next</button>
        </div>`;
      this._filterProducts();
    } else if (step===3) {
      const prod=DB.get().products.find(p=>p.id===this._logData.productId);
      const curQty=Stock.qty(this._logData.productId,this._getLogStoreId());
      const fromOpts=FROM_OPTIONS[this._logData.type]||[];
      const toOpts=TO_OPTIONS[this._logData.type]||[];
      const isReturn=this._logData.type==='return_in';
      const typeLabel=this._logData.type==='in'?'▲ STOCK IN':isReturn?'↩ RETURN IN':'▼ STOCK OUT';
      const typeColor=this._logData.type==='out'?'#dc2626':isReturn?'#b45309':'#16a34a';
      // Contextual reasons based on current from/to selection
      const contextKey=this._logData.type==='out'?(this._logData.stockTo||''):(this._logData.stockFrom||'');
      const reasonsMap=REASONS_MAP[this._logData.type]||{};
      const reasons=reasonsMap[contextKey]||reasonsMap['_default']||REASONS[this._logData.type]||[];
      el.innerHTML=`
        <div style="margin-bottom:16px">
          <div style="font-weight:600;font-size:1rem">${prod?.name}</div>
          <div style="color:#6b7280;font-size:.8rem">${UI.catName(prod?.catId)} · <span style="color:${typeColor};font-weight:600">${typeLabel}</span> · Stock at ${UI.storeName(this._getLogStoreId())}: <strong>${curQty}</strong></div>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity *</label>
          <input type="text" inputmode="numeric" pattern="[0-9]*" class="form-input" id="inp-qty" min="1" step="1" value="${this._logData.qty||''}" placeholder="Enter quantity" style="max-width:180px">
        </div>
        ${fromOpts.length?`<div class="form-group">
          <label class="form-label">${isReturn?'Returned From *':'Stock Coming From *'}</label>
          <select class="form-select" id="inp-from" style="max-width:320px" onchange="Pages._onFromToChange()">
            <option value="">Select source...</option>
            ${fromOpts.map(o=>`<option value="${o}" ${(this._logData.stockFrom||'').startsWith(o)?'selected':''}>${o}</option>`).join('')}
          </select>
          <div id="from-store-pick"></div>
        </div>`:''}
        ${toOpts.length?`<div class="form-group">
          <label class="form-label">Stock Going To *</label>
          <select class="form-select" id="inp-to" style="max-width:320px" onchange="Pages._onFromToChange()">
            <option value="">Select destination...</option>
            ${toOpts.map(o=>`<option value="${o}" ${(this._logData.stockTo||'').startsWith(o)?'selected':''}>${o}</option>`).join('')}
          </select>
          <div id="to-store-pick"></div>
        </div>`:''}
        <div class="form-group">
          <label class="form-label">Reason *</label>
          <select class="form-select" id="inp-reason-sel" onchange="Pages._handleReasonChange()" style="max-width:320px">
            <option value="">Select reason...</option>
            ${reasons.map(r=>`<option value="${r}" ${this._logData.reason===r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" id="reason-other-grp" style="display:${this._logData.reason==='Other'?'block':'none'}">
          <label class="form-label">Please specify</label>
          <input class="form-input" id="inp-reason-other" value="${this._logData.reasonOther||''}" placeholder="Enter details..." style="max-width:320px">
        </div>
        ${isReturn?`
        <div class="form-group">
          <label class="form-label">Return Condition *</label>
          <select class="form-select" id="inp-condition" style="max-width:320px">
            <option value="">Select condition...</option>
            <option value="Resalable" ${this._logData.returnCondition==='Resalable'?'selected':''}>✓ Resalable</option>
            <option value="Damaged — Write Off" ${this._logData.returnCondition==='Damaged — Write Off'?'selected':''}>✗ Damaged — Write Off</option>
            <option value="Damaged — Return to Supplier" ${this._logData.returnCondition==='Damaged — Return to Supplier'?'selected':''}>↩ Damaged — Return to Supplier</option>
          </select>
        </div>`:''}
        <div class="form-group">
          <label class="form-label">Your Name *</label>
          <input type="text" class="form-input" id="inp-name" value="${this._logData.staffName||''}" placeholder="Enter your name" style="max-width:260px">
        </div>
        <div style="margin-top:8px;display:flex;justify-content:flex-end">
          <button class="btn btn-secondary" style="margin-right:8px" onclick="Pages._logBack()">Back</button>
          <button class="btn btn-primary" onclick="Pages._logNext()">Review</button>
        </div>`;
      // Restore store pickers if From/To previously selected
      if(this._logData.stockFrom||this._logData.stockTo) this._onFromToChange();
    } else if (step===4) {
      const d4=DB.get(); const prod=d4.products.find(p=>p.id===this._logData.productId);
      const isReturnC=this._logData.type==='return_in';
      const typeColor=this._logData.type==='in'?'#16a34a':isReturnC?'#d97706':'#dc2626';
      const typeLabel=this._logData.type==='in'?'▲ STOCK IN':isReturnC?'↩ RETURN IN':'▼ STOCK OUT';
      const destStore=d4.stores.find(s=>s.id===this._getLogStoreId());
      const isHOOut=Auth.isHO()&&this._logData.type==='out'&&destStore?.isFranchise;
      const discountPct=isHOOut?(prod?.franchiseDiscount||destStore?.franchiseDiscount||null):null;
      const sellPrice=isHOOut?(prod?.price||null):null;
      const transferUnit=discountPct&&sellPrice?sellPrice*(1-discountPct/100):null;
      const transferTotal=transferUnit?transferUnit*parseInt(this._logData.qty||0, 10):null;
      const markupBanner=isHOOut?`<div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:10px;padding:14px 16px;margin-bottom:16px">
        <div style="font-weight:700;color:#7c3aed;margin-bottom:6px;font-size:.85rem">🔗 Franchise Transfer Pricing</div>
        ${transferUnit?`<div style="display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:.85rem;color:#6b7280">
          <span>Sell Price:</span><strong>${UI.fmt(sellPrice)}</strong>
          <span>Franchise Discount:</span><strong style="color:#7c3aed">${discountPct}% off</strong>
          <span>Unit Transfer Price:</span><strong style="color:#7c3aed;font-size:1rem">${UI.fmt(transferUnit)}</strong>
          <span>Total Transfer Value:</span><strong style="color:#7c3aed;font-size:1rem">${UI.fmt(transferTotal)}</strong>
        </div>`:
        `<div style="font-size:.8rem;color:#9ca3af">No sell price or discount configured — set in Products & Stores.</div>`}
      </div>`:'';
      const extraRows=[
        this._logData.stockFrom?`<div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Stock From</div><div style="font-weight:600;margin-top:4px">${this._logData.stockFrom}</div></div>`:'',
        this._logData.stockTo?`<div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Stock To</div><div style="font-weight:600;margin-top:4px">${this._logData.stockTo}</div></div>`:'',
        this._logData.returnCondition?`<div style="grid-column:1/-1"><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Return Condition</div><div style="font-weight:600;margin-top:4px">${this._logData.returnCondition}</div></div>`:''
      ].filter(Boolean).join('');
      el.innerHTML=`
        <div style="margin-bottom:16px;font-weight:600">Confirm Movement</div>
        ${markupBanner}
        <div class="card" style="background:#f9fafb;box-shadow:none;margin-bottom:16px">
          <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Type</div><div style="font-weight:700;color:${typeColor};margin-top:4px">${typeLabel}</div></div>
            <div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Location</div><div style="font-weight:600;margin-top:4px">${UI.storeName(this._getLogStoreId())}${destStore?.isFranchise?' <span class="franchise-badge">Franchise</span>':''}</div></div>
            <div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Product</div><div style="font-weight:600;margin-top:4px">${prod?.name}</div></div>
            <div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Quantity</div><div style="font-size:1.5rem;font-weight:700;font-family:'Playfair Display',serif;margin-top:2px">${this._logData.qty}</div></div>
            <div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Staff</div><div style="font-weight:600;margin-top:4px">${this._logData.staffName}</div></div>
            <div><div style="font-size:.7rem;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Reason</div><div style="margin-top:4px">${this._logData.reason}</div></div>
            ${extraRows}
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-secondary" style="margin-right:8px" onclick="Pages._logBack()">Back</button>
          <button class="btn btn-primary" onclick="Pages._submitLog()">✓ Confirm</button>
        </div>`;
    }
  },

  _onFromToChange() {
    const type=this._logData.type;
    const fromVal=document.getElementById('inp-from')?.value||'';
    const toVal=document.getElementById('inp-to')?.value||'';
    const contextKey=type==='out'?toVal:fromVal;
    const reasonsMap=REASONS_MAP[type]||{};
    const reasons=reasonsMap[contextKey]||reasonsMap['_default']||REASONS[type]||[];
    // Rebuild reason select with contextual options
    const rSel=document.getElementById('inp-reason-sel');
    if(rSel){
      const cur=rSel.value;
      rSel.innerHTML=`<option value="">Select reason...</option>${reasons.map(r=>`<option value="${r}" ${r===cur?'selected':''}>${r}</option>`).join('')}`;
      const grp=document.getElementById('reason-other-grp');
      if(grp)grp.style.display=rSel.value==='Other'?'block':'none';
    }
    const d=DB.get(); const curStore=this._getLogStoreId();
    const activeStores=d.stores.filter(s=>s.active&&s.id!==curStore&&(s.type!=='warehouse'||s.isFranchiseOffice));
    const storeOpts=activeStores.map(s=>`<option value="${s.id}">${s.name}${s.isFranchiseOffice?' 📦':s.isFranchise?' 🔗':''}</option>`).join('');
    // FROM store picker
    const fromPick=document.getElementById('from-store-pick');
    if(fromPick){
      if(STORE_PICKER_FROM.includes(fromVal)){
        fromPick.innerHTML=`<div class="form-group" style="margin-top:8px"><label class="form-label">Specific Location *</label><select class="form-select" id="inp-from-store" style="max-width:320px"><option value="">Select location...</option>${storeOpts}</select></div>`;
        const sel=document.getElementById('inp-from-store');
        if(sel&&this._logData.stockFromStoreId)sel.value=this._logData.stockFromStoreId;
      }else{fromPick.innerHTML='';}
    }
    // TO store picker
    const toPick=document.getElementById('to-store-pick');
    if(toPick){
      if(STORE_PICKER_TO.includes(toVal)){
        toPick.innerHTML=`<div class="form-group" style="margin-top:8px"><label class="form-label">Destination Store *</label><select class="form-select" id="inp-to-store" style="max-width:320px"><option value="">Select store...</option>${storeOpts}</select></div>`;
        const sel=document.getElementById('inp-to-store');
        if(sel&&this._logData.stockToStoreId)sel.value=this._logData.stockToStoreId;
      }else{toPick.innerHTML='';}
    }
  },
  _handleReasonChange() {
    const val=document.getElementById('inp-reason-sel')?.value;
    const grp=document.getElementById('reason-other-grp');
    if(grp)grp.style.display=val==='Other'?'block':'none';
  },
  _selectType(t) { this._logData.type=t; this._logStep=2; this._renderLogStep(); },
  _selectPT(id)  {
    this._logData.ptId=id; this._logData.productId=null; this._logData.catId=null;
    document.querySelectorAll('#pt-chips .filter-chip').forEach(c=>c.classList.toggle('active',c.textContent===DB.get().productTypes.find(p=>p.id===id)?.name));
    // Rebuild category chips for new type
    const d=DB.get(); const cats=id?d.categories.filter(c=>c.ptId===id):d.categories;
    const catWrap=document.getElementById('cat-chips');
    if(catWrap)catWrap.innerHTML=`<span class="filter-chip active" onclick="Pages._selectCat(null)">All</span>${cats.map(c=>`<span class="filter-chip" onclick="Pages._selectCat('${c.id}')">${c.name}</span>`).join('')}`;
    this._filterProducts();
  },
  _selectCat(id) {
    this._logData.catId=id; this._logData.productId=null;
    document.querySelectorAll('#cat-chips .filter-chip').forEach(c=>c.classList.toggle('active',id===null?c.textContent==='All':c.getAttribute('onclick')?.includes(`'${id}'`)));
    this._filterProducts();
  },
  _filterProducts() {
    const search=document.getElementById('prod-search')?.value.toLowerCase()||'';
    const d=DB.get();
    let cats=this._logData.ptId?d.categories.filter(c=>c.ptId===this._logData.ptId).map(c=>c.id):d.categories.map(c=>c.id);
    if(this._logData.catId) cats=[this._logData.catId];
    const prods=d.products.filter(p=>p.active&&cats.includes(p.catId)&&(!search||p.name.toLowerCase().includes(search)||p.id.toLowerCase().includes(search)));
    const grid=document.getElementById('prod-grid'); if(!grid)return;
    grid.innerHTML=prods.map(p=>`<div class="product-card-sel ${this._logData.productId===p.id?'selected':''}" onclick="Pages._selectProduct('${p.id}')"><div class="pname">${p.name}</div><div class="pref">${p.id}</div></div>`).join('')||'<div style="color:#9ca3af;font-size:.8rem;grid-column:1/-1;padding:12px 0">No products found</div>';
    const btn=document.getElementById('step2-next'); if(btn)btn.disabled=!this._logData.productId;
  },
  _selectProduct(id) {
    this._logData.productId=id;
    document.querySelectorAll('.product-card-sel').forEach(c=>c.classList.toggle('selected',c.onclick?.toString().includes(`'${id}'`)));
    const btn=document.getElementById('step2-next'); if(btn)btn.disabled=false;
    this._filterProducts();
  },
  _logNext() {
    if(this._logStep===2&&!this._logData.productId){UI.toast('Please select a product','error');return;}
    if(this._logStep===3){
      const qty=parseInt(document.getElementById('inp-qty')?.value, 10);
      const name=document.getElementById('inp-name')?.value.trim();
      const reasonSel=document.getElementById('inp-reason-sel')?.value;
      const reasonOther=document.getElementById('inp-reason-other')?.value.trim();

      const toSel=document.getElementById('inp-to')?.value;
      const condSel=document.getElementById('inp-condition')?.value;
      const fromStoreId=document.getElementById('inp-from-store')?.value||null;
      const toStoreId=document.getElementById('inp-to-store')?.value||null;
      const fromOpts=FROM_OPTIONS[this._logData.type]||[];
      const toOpts=TO_OPTIONS[this._logData.type]||[];
      const isReturn=this._logData.type==='return_in';
      if(!qty||qty<1){UI.toast('Please enter a valid quantity','error');return;}
      if(!name){UI.toast('Please enter your name','error');return;}
      if(!reasonSel){UI.toast('Please select a reason','error');return;}
      if(fromOpts.length&&!fromSel){UI.toast('Please select where stock is coming from','error');return;}
      if(toOpts.length&&!toSel){UI.toast('Please select where stock is going to','error');return;}

      this._logData.stockToStoreId=toStoreId;
      this._logData.stockFrom=fromSel?(fromStoreId?fromSel+' — '+UI.storeName(fromStoreId):fromSel):null;

  _logBack() { if(this._logStep>1){this._logStep--;this._renderLogStep();} },
  _submitLog() {
    const d=DB.get();
    const isReturnSub=this._logData.type==='return_in';
    const txn={
      id:'txn_'+Date.now()+'_'+Math.random().toString(36).slice(2,8), date:new Date().toISOString().slice(0,10),

      returnCondition:isReturnSub?(this._logData.returnCondition||null):null,
      editLog:[], createdAt:new Date().toISOString()
    };
    if(txn.type==='out'||txn.type==='move_out'){
      const avail=Stock.qty(txn.productId,txn.storeId);
      if(avail<txn.qty){UI.toast(`⚠ Insufficient stock — only ${avail} unit${avail!==1?'s':''} available`,'error');return;}
    }
    d.transactions.push(txn); DB.commit();

    this._logStep=1; this._logData={selectedStoreId:this._getLogStoreId()};
    this._renderLogStep(); this._renderTodayMovements();
    const alts=Stock.alerts().filter(a=>a.product.id===txn.productId&&a.store.id===txn.storeId);
    if(alts.length)UI.toast('⚠️ Low stock alert triggered','error');
  },
  _renderTodayMovements() {
    const today=new Date().toISOString().slice(0,10);
    const storeId=this._getLogStoreId()||Auth.storeId();
    const txns=DB.get().transactions.filter(t=>t.date===today&&t.storeId===storeId).reverse().slice(0,10);

    if(!txns.length){el.innerHTML='<div style="color:#9ca3af;font-size:.825rem;padding:8px 0">No movements logged today.</div>';return;}
    const typeBadge=t=>{
      if(t.type==='in') return '<span class="badge badge-green">▲ IN</span>';
      if(t.type==='return_in') return '<span class="badge" style="background:#fef3c7;color:#92400e;border:1px solid #fbbf24;font-weight:700">↩ RETURN</span>';

      if(t.stockTo) parts.push(`<span style="color:#6b7280">To:</span> ${t.stockTo}`);

    };
    el.innerHTML=`<table style="width:100%;font-size:.82rem"><thead><tr><th>Time</th><th>Product</th><th>Type</th><th>Qty</th><th>By</th><th>Reason</th><th>From / To</th><th></th></tr></thead><tbody>
      ${txns.map(t=>`<tr>
        <td style="white-space:nowrap">${new Date(t.createdAt).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}</td>
        <td><strong>${UI.productName(t.productId)}</strong></td>
        <td>${typeBadge(t)}</td>
        <td><strong>${t.qty}</strong></td>
        <td>${t.staffName}</td>
        <td style="color:#6b7280;font-size:.8rem">${t.reason||'—'}${t.returnCondition?`<br><span style="color:#92400e;font-size:.75rem;font-style:italic">${t.returnCondition}</span>`:''}</td>
        <td style="font-size:.8rem">${fromTo(t)}</td>
        <td style="white-space:nowrap;display:flex;gap:4px;align-items:center">
          ${(Date.now()-new Date(t.createdAt).getTime())<300000?`<button class="btn btn-sm" style="background:#fef3c7;color:#92400e;border:1px solid #fbbf24;font-weight:700;padding:4px 10px" onclick="Pages._undoMovement('${t.id}')">↩ Undo</button>`:''}
          <button class="btn btn-sm btn-danger" onclick="Pages._deleteLog('${t.id}')">Delete</button>
        </td>
      </tr>`).join('')}</tbody></table>`;
  },
  _deleteLog(id) {
    const delReasons=['Mistake','Double Entry','Wrong Entry','Other'];
    UI.modal('Delete Movement',
      `<p style="color:#6b7280;font-size:.85rem;margin-bottom:16px">This action is recorded in the audit log.</p>
       <div class="form-group"><label class="form-label">Your Name *</label><input class="form-input" id="del-name" placeholder="Enter your name" style="max-width:260px"></div>

         <select class="form-select" id="del-reason" onchange="document.getElementById('del-other-grp').style.display=this.value==='Other'?'block':'none'" style="max-width:280px">
           <option value="">Select reason...</option>
           ${delReasons.map(r=>`<option value="${r}">${r}</option>`).join('')}
         </select>

  _confirmDelete(id) {
    const name=document.getElementById('del-name')?.value.trim();
    const reasonSel=document.getElementById('del-reason')?.value;
    const reasonOther=document.getElementById('del-other')?.value.trim();
    if(!name){UI.toast('Please enter your name','error');return;}
    if(!reasonSel){UI.toast('Please select a deletion reason','error');return;}
    const reason=reasonSel==='Other'?(reasonOther||'Other'):reasonSel;
    const d=DB.get(); const idx=d.transactions.findIndex(t=>t.id===id);
    if(idx>=0){
      const txn=d.transactions[idx];
      txn.editLog.push({action:'deleted',by:name,reason:reason,at:new Date().toISOString()});
      if(!d.deletedTransactions)d.deletedTransactions=[];
      d.deletedTransactions.push({...txn,_deletedAt:new Date().toISOString(),_deletedBy:name,_deleteReason:reason});
      d.transactions.splice(idx,1); DB.commit();
      UI.closeModal(); UI.toast('Movement deleted','info'); this._renderTodayMovements();
    }
  },

  _undoMovement(id) {
    const d=DB.get(); const t=d.transactions.find(tx=>tx.id===id);
    if(!t){UI.toast('Movement not found','error');return;}
    const ageMs=Date.now()-new Date(t.createdAt).getTime();
    if(ageMs>300000){UI.toast('Undo window expired — movements can only be undone within 5 minutes.','error');this._renderTodayMovements();return;}
    const icon=t.type==='in'?'▲':t.type==='return_in'?'↩':'▼';
    const prodName=UI.productName(t.productId);
    UI.confirm('Undo Movement',`Undo ${icon} ${t.qty}× ${prodName}? This will reverse the stock movement.`,()=>{
      const d2=DB.get();const t2=d2.transactions.find(tx=>tx.id===id);
      if(!t2){UI.toast('Movement not found','error');return;}
      const idx=d2.transactions.findIndex(tx=>tx.id===id);
      if(idx>=0){
        if(!d2.deletedTransactions)d2.deletedTransactions=[];
        d2.deletedTransactions.push({...t2,_deletedAt:new Date().toISOString(),_deletedBy:Auth.user()?.name||Auth.user()?.username||'unknown',_deleteReason:'Undo — reversed within 5 min window'});
        d2.transactions.splice(idx,1);
        DB.commit();
        UI.toast(`Movement undone — ${icon} ${t2.qty}× ${prodName}`,'success');
        Pages._renderTodayMovements();
      }
    },'Undo');
  },

  _renderStoreStockTable() {

  _renderStockTakeRows() {
    const storeId=this._stSelectedStoreId||Auth.storeId();
    const d=DB.get();
    let prods=d.products.filter(p=>p.active);
    if(this._stPtId){
      const catIds=d.categories.filter(c=>c.ptId===this._stPtId).map(c=>c.id);
      prods=prods.filter(p=>catIds.includes(p.catId));
    }
    if(this._stCatId) prods=prods.filter(p=>p.catId===this._stCatId);
    document.getElementById('st-rows').innerHTML=`<table><thead><tr><th>Product</th><th>System Qty</th><th>Physical Count</th><th>Difference</th></tr></thead><tbody>
      ${prods.map(p=>{
        const sys=Stock.qty(p.id,storeId); const val=this._stData[p.id]??'';
        const diff=val!==''?(parseInt(val, 10)-sys):'';
        // Red=system>physical (diff<0), Green=match (diff=0), Yellow=physical>system (diff>0)
        const diffHtml=diff!==''?(diff===0?'<span class="badge badge-green">✓ Match</span>':diff>0?`<span class="badge badge-amber">+${diff} surplus</span>`:`<span class="badge badge-red">${diff} shortage</span>`):'';
        return `<tr><td><strong>${p.name}</strong><br><span style="color:#9ca3af;font-size:.7rem">${p.id}</span></td><td><strong>${sys}</strong></td><td><input type="number" class="form-input" value="${val}" min="0" style="max-width:100px" oninput="Pages._updateSTRow('${p.id}',this.value,${sys})" placeholder="Count"></td><td id="st-diff-${p.id}">${diffHtml}</td></tr>`;
      }).join('')}</tbody></table>`;
  },
  _updateSTRow(productId,val,sys) {
    this._stData[productId]=val;
    const diff=val!==''?(parseInt(val, 10)-sys):'';
    const el=document.getElementById('st-diff-'+productId);
    if(el)el.innerHTML=diff!==''?(diff===0?'<span class="badge badge-green">✓ Match</span>':diff>0?`<span class="badge badge-amber">+${diff} surplus</span>`:`<span class="badge badge-red">${diff} shortage</span>`):'';
  },
  _submitStockTake() {
    const entries=Object.entries(this._stData).filter(([,v])=>v!=='');
    if(!entries.length){UI.toast('Please enter at least one count','error');return;}
    const storeId=this._stSelectedStoreId||Auth.storeId(); const d=DB.get();
    const take={ id:'st_'+Date.now(), date:new Date().toISOString().slice(0,10), storeId, completedBy:Auth.user().name,
      items:entries.map(([productId,physical])=>({productId,systemCount:Stock.qty(productId,storeId),physicalCount:parseInt(physical, 10),difference:parseInt(physical, 10)-Stock.qty(productId,storeId)}))
    };
    d.stockTakes.push(take); DB.commit();
    const disc=take.items.filter(i=>i.difference!==0).length;
    UI.toast(`Stock take submitted — ${take.items.length} items counted${disc?`, ${disc} discrepancies`:', all matched!'}`,disc?'error':'success');
  },

  _copyAlertSummary() {
    const alerts=Stock.alerts();
    if(!alerts.length){UI.toast('No alerts to copy','info');return;}
    const dateStr=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
    const critical=alerts.filter(a=>a.critical);
    const warning=alerts.filter(a=>!a.critical);
    let text=`BANG ON BROWS — LOW STOCK REPORT\n${dateStr}\n${'='.repeat(40)}\n\n`;
    if(critical.length){
      text+=`🚨 OUT OF STOCK (${critical.length} item${critical.length!==1?'s':''})\n`;
      critical.forEach(a=>{text+=`  • ${a.product.name} — ${a.store.name} (${a.qty} in stock, min: ${a.minQty})\n`;});
      text+='\n';
    }
    if(warning.length){
      text+=`⚠️ RUNNING LOW (${warning.length} item${warning.length!==1?'s':''})\n`;
      warning.forEach(a=>{text+=`  • ${a.product.name} — ${a.store.name} (${a.qty} in stock, min: ${a.minQty})\n`;});
    }
    text+='\n'+'-'.repeat(40)+'\nGenerated by BOB Stock Manager';
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>UI.toast('Summary copied to clipboard ✓','success')).catch(()=>{
        const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);UI.toast('Summary copied','success');
      });
    } else {
      const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);UI.toast('Summary copied','success');
    }
  },

  _renderHOStockTable() {
    const d=DB.get(); const isFran=Auth.isFranchisee(); const isHO=Auth.isHO(); const isSL=Auth.isStoreLevel();
    const storeIds=(isFran||isSL)?Auth.storeIds():null;
    const storeFilter=document.getElementById('hs-store')?.value;
    const mgmtStoreIds=this._hsStoreIds&&this._hsStoreIds.length?this._hsStoreIds:null;
    const ptFilter=document.getElementById('hs-pt')?.value;
    const catFilter=document.getElementById('hs-cat')?.value;
    const search=document.getElementById('hs-search')?.value.toLowerCase()||'';
    // visibleStores: for franchisee/store-level = their locations only; for HO = all stores + franchise offices + head_office
    const _allVisibleForFilter = (isFran||isSL)
      ? d.stores.filter(s=>s.active&&storeIds.includes(s.id))
      : d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.id==='head_office'||s.isFranchiseOffice));
    const allStores=storeFilter?[d.stores.find(s=>s.id===storeFilter)||{id:'head_office',name:'Head Office (Warehouse)',type:'warehouse'}].filter(s=>s.id):
      mgmtStoreIds ? [
        mgmtStoreIds.includes('head_office')?{id:'head_office',name:'HO Warehouse',type:'warehouse'}:null,
        ...d.stores.filter(s=>s.active&&mgmtStoreIds.includes(s.id))
      ].filter(Boolean) : _allVisibleForFilter;
    let prods=d.products.filter(p=>p.active&&(!catFilter||p.catId===catFilter)&&(!search||p.name.toLowerCase().includes(search)||p.id.toLowerCase().includes(search)));
    if(ptFilter){const ptCatIds=d.categories.filter(c=>c.ptId===ptFilter).map(c=>c.id);prods=prods.filter(p=>ptCatIds.includes(p.catId));}
    // Update stat cards to reflect current filters (HO/Director only)
    if(!isFran&&document.getElementById('hs-stat-ho')){
      const ptStatCatIds=ptFilter?d.categories.filter(c=>c.ptId===ptFilter).map(c=>c.id):null;
      const statProds=d.products.filter(p=>p.active&&(!catFilter||p.catId===catFilter)&&(!ptStatCatIds||ptStatCatIds.includes(p.catId)));
      const allVisibleStores=d.stores.filter(s=>s.active&&(s.type!=='warehouse'||s.isFranchiseOffice));
      const calcVal=(sIds)=>statProds.reduce((sum,p)=>sum+sIds.reduce((s2,sId)=>s2+Stock.qty(p.id,sId)*(p.price||0),0),0);
      let hoVal,inStoreVal,totalVal,hoLbl,inStoreLbl,totalLbl;
      if(storeFilter==='head_office'){
        hoVal=calcVal(['head_office']); inStoreVal=0; totalVal=hoVal;
        hoLbl='HO Warehouse Value (AUD)'; inStoreLbl='In-Store Value (AUD)'; totalLbl='Selected Scope (AUD)';
      } else if(storeFilter){
        const selStore=d.stores.find(s=>s.id===storeFilter);
        hoVal=calcVal(['head_office']); inStoreVal=calcVal([storeFilter]); totalVal=inStoreVal;
        hoLbl='HO Warehouse Value (AUD)'; inStoreLbl=`${selStore?.name||storeFilter} Value (AUD)`; totalLbl='Selected Store Total (AUD)';
      } else if(mgmtStoreIds) {
        const selNonHO=mgmtStoreIds.filter(id=>id!=='head_office');
        const hasHO=mgmtStoreIds.includes('head_office');
        hoVal=calcVal(['head_office']);
        inStoreVal=selNonHO.length?calcVal(selNonHO):0;
        totalVal=(hasHO?hoVal:0)+inStoreVal;
        const selNames=selNonHO.map(id=>d.stores.find(s=>s.id===id)?.name||id);
        hoLbl='HO Warehouse Value (AUD)';
        inStoreLbl=selNonHO.length===1?`${selNames[0]} Value (AUD)`:`Selected Stores Value (AUD)`;
        totalLbl=`Selected Scope (AUD)`;
      } else {
        hoVal=calcVal(['head_office']);
        inStoreVal=calcVal(allVisibleStores.map(s=>s.id));
        totalVal=hoVal+inStoreVal;
        hoLbl='HO Warehouse Value (AUD)'; inStoreLbl='In-Store Total Value (AUD)'; totalLbl=catFilter?'Filtered Portfolio (AUD)':'Total Portfolio (AUD)';
      }
      document.getElementById('hs-stat-ho').textContent=UI.fmt(hoVal);
      document.getElementById('hs-stat-instore').textContent=UI.fmt(inStoreVal);
      document.getElementById('hs-stat-total').textContent=UI.fmt(totalVal);
      document.getElementById('hs-stat-ho-lbl').textContent=hoLbl;
      document.getElementById('hs-stat-instore-lbl').textContent=inStoreLbl;
      document.getElementById('hs-stat-total-lbl').textContent=totalLbl;
    }
    if(storeFilter){
      document.getElementById('hs-table').innerHTML=`<table><thead><tr><th>Ref</th><th>Product</th><th>Category</th><th>Stock</th><th>Status</th><th>Value (AUD)</th></tr></thead><tbody>${prods.map(p=>{
        const qty=Stock.qty(p.id,storeFilter); const thr=Stock.threshold(p.id,storeFilter); const val=p.price?qty*p.price:null;
        return `<tr><td style="color:#9ca3af;font-size:.75rem">${p.id}</td><td><strong>${p.name}</strong></td><td>${UI.catName(p.catId)}</td><td>${UI.stockBadge(qty,thr?.minQty)}</td><td>${!thr?'<span class="badge badge-gray">No threshold</span>':qty===0?'<span class="badge badge-red">Out of Stock</span>':qty<=thr.minQty?'<span class="badge badge-amber">Low</span>':'<span class="badge badge-green">OK</span>'}</td><td>${val!=null?UI.fmt(val):'—'}</td></tr>`;
      }).join('')}</tbody></table>`;
    } else {
      const displayStores=allStores.filter(s=>s);
      document.getElementById('hs-table').innerHTML=`<table><thead><tr><th>Product</th>${displayStores.map(s=>`<th>${s.name}${s.type==='warehouse'?' 🏭':s.isFranchise?' 🔗':''}</th>`).join('')}<th>Total</th></tr></thead><tbody>
        ${prods.map(p=>{
          const qtys=displayStores.map(s=>Stock.qty(p.id,s.id));
          const total=qtys.reduce((a,b)=>a+b,0);
          return `<tr><td><strong>${p.name}</strong><br><span style="color:#9ca3af;font-size:.7rem">${p.id}</span></td>${qtys.map((q,i)=>{const thr=Stock.threshold(p.id,displayStores[i].id);return `<td>${UI.stockBadge(q,thr?.minQty)}</td>`;}).join('')}<td><strong>${total}</strong></td></tr>`;
        }).join('')}</tbody></table>`;
    }
  },

  _renderMovementsTable() {
